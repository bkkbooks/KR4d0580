body:
  text: 環谷集巻三元汪克寛撰策省試策三代以上經術施於治道三代以下治道隱於經術而能明之者葢鮮自唐以降且别而二之益可嘆也夫三代以上天子公卿行於上故言而為尚書行而為春秋進退周旋法乎易動容舉措中乎禮歌之為詩奏之為樂施之治道無非經術教萬民而賔興之文藝後於徳行初未嘗以明經而取人也及周之衰賢聖之君不作學校之政不修教化凌夷風俗頽敗時則有若孔子之聖而不得君師之位以行其政教於是乃取先王之法誦而傳之以詔後世删詩書贊易象定禮樂修春秋使後之學者詩足以正言書足以廣聽易足以通神明類萬物春秋足以斷事禮足以明體樂可以和神而唐虞三代之治道悉具於六經之策矣然當是時見而知之者有四科之目如閔子騫仲弓居徳行之科而能諌長府之改作悟行簡以臨民子由子夏居文學之科而能興絃歌之化發仕優之言是皆逹於政事者則其徳非尾生孝己之流而其學非記誦辭章之習矣此古之儒者所謂施經術於治道習文法而通世務者也暴秦煽虐煨燼六經而三代之道遂冺漢高之興靡好儒術不足論矣以孝文之賢君尊黄老而尚刑名當時所得如賈誼鼂錯皆習申韓之說是則雖曰廣遊學之路而實未嘗用儒也孝武始求亡書表章六經人材之出於科目者衆矣然能求治道於經術者僅見一二董仲舒正誼明道且泥於災異幾不免其身公孫𢎞學究天人曲學以阿世倪寛博通經術而亦無所匡諫於其君葢雖邪正之不同而於世務之際皆有論者厥後雋不疑引春秋蒯聵以斷事劉向推五行以徵五事之休咎平當考禹貢之行河究疏鑿之源張敞以經術飾吏而能剸煩以治劇四人者雖能考經術以明時務然其行事皆有未盡善者不能通治道之大體也東京之世高者立竒節下者守章句以經術而明治道者益無聞矣南北分裂歴隋及唐而設科之目至八十有六今雖未暇疏舉然自明經宏詞等科一設而時務之與儒術葢岐而二之夫始也治道隱於經術猶有能明之者終也治道别於經術而章句之徒遂與案牘之吏如氷炭之不侔至韓愈氏僅能因文以見道而諫不行言不聽終亦無益於唐之治惜哉下逮宋氏章句之習益滋而壞亂極矣欽惟聖朝興崇文治取士以徳行為首較藝則以經史時務兼之將欲求治道於經術其中選者俱授州縣之官使朝廷之行皆合六經而牧民之職多出儒士甚盛舉也茲承執事先生發策秋闈下詢末學以䆒時務之實舉昔人論吏治之八計為問愚敢稽諸徃古酌諸當時之務以對夫古者有一年成市二年成邑三年成都者孔子適衛發庶矣之嘆孟子於齊有民不改聚之言今求户口之增不必待十年而生聚也但輕其徭稅俾安其業家給人足無流離轉徙之患則戸口豐而撫字稱矣古者田必井授八家各授田以同養公田宅不毛者出里布民無職事者征夫家今田不可復井也欲求墾田之多不必如李悝盡地力但核勸農之實加優卹之方罷妨農之務則墾田廣而本末辨矣古者力役之征歲不過三日後世過之而不贍今亦不必如十日二十日之說也但能視田畝之多寡以均役視年歲之凶豐以行役而後停不急之務罷雜泛之徵則賦役均而亷冒别矣古者虞芮質成而不争聽訟必使無訟今不必如縱囚四百也但能嚴法律而使之不敢犯有罪則速斷之以警其餘毋淹滯以苦其身毋數縱以恣其倖則囚繫寡而聽斷果矣古者道不拾遺山無盗賊後世或至外户不閉今不必加詰盗之法也但能常恤貧民使無凍餒鰥寡孤獨各得其所又重令以禁未犯而峻法以治其已犯則姦盗息而禁禦嚴矣古者卿大夫賔興賢能而升之司徒司馬論定然後官之後世舉之於郡國今選舉之法不必更定也但核薦舉而革冒濫厚敦遣而公遴選棄其小以取其大因其文以觀其心數年之後人才旣盛又當增中選之額則選舉衆而風化行矣古者自王宮國都以及閭巷莫不有學而教養必有其方後世猶有爭欲為學官弟子者今學校不必復興也但能擇師儒之官而講習無虛日敦養育之規而旣禀無侵漁使所養皆在儒生而儒生盡得其養則學校興而教化勤矣如是則八計之策雖不盡出於經史而聖賢之大意不越是矣經術而施之治道不過如此而已矣愚嘗考之國朝之典凡州縣之官以五事為殿最給由銓注則驗之即所謂稽撫字稽本末稽亷冒稽聽斷稽禁禦者也他如學校選舉之事則令風憲之司以紏察之葢如陸宣公之八計自有脗合焉者而古人三考黜陟不外是矣然愚竊謂興崇學校選舉人材非細務也宣公所以先戸口墾田而終之以二事者所以庶而富富而教之意也然學校不修則民不知義人材不舉則吏不稱職二者為政之所當重也今國家之法長吏給由而不述其事吏部銓注而不考其績雖曰風憲紏察而或失其詳得非善政之小疵歟五事之備徃徃未觀其成效得非州縣之官未盡出於科舉而政治不本於經術之故歟抑朝廷千里之遠給由或得以詐偽恐考績者猶有未盡其實歟執事先生欲求設施之要則愚已粗陳於前欲其八計之成效則在考績之覈實而已矣愚也草澤之士㓜績聖人之經確守先儒之緒惟知窮理修身而推之平治之業若夫雕組之文則所未學也茲敢以草茅之見直述其故以對惟高明恕其强妄可也執事先生舉唐志有曰方其取以詞章若浮文而少實及其臨事設施隱然為國名臣愚謂昔之名臣雖未敢望其萬一而設施之序葢得之素講矣執士之幸也實多士之幸也論先王制禮之盛論盛哉先王之禮也其本在於養性防欲其用在於視聽言動周旋揖遜之間使人之視聽言動周旋揖遜一於禮則安有放其邪心驕奢淫佚蕩而莫之節者哉不放其邪心不驕奢淫佚蕩而莫之節則禍亂可息孝弟可行治教可興其立意微其為法遠矣故設其器備其物辨其數立其文以待其有事者其用則在乎視聽言動周旋揖遜之間而已然孝弟莫始於親親親親之心無所不用則燕之之禮不得而廢焉燕之之禮不得而廢則設其器備其物辨其數立其文以待其有事者於是而用之也是故莫尊乎君也君雖尊不以位加於父兄燕序必以齒者逹乎孝弟之道也莫親乎同姓也然親親不可以無殺燕則族人世降一等焉凡燕之禮必主賔以備酬酢而族燕之賔主則異姓與膳宰為之者篤親親之道也夫飲食口腹之欲也而必節之以禮則驕奢淫佚平而無過也歌舞耳目之欲也而必加之以樂則言動揖遜易而無乖也莫不由親以篤乎恩有恩以著乎愛有愛以盡其禮盡其禮則言動視聽周旋揖遜之間不徒接乎耳目所以服習而安之者自得於養性防欲之幾也雖然不特宗族兄弟之親也遠而異姓諸侯之君臣以至於蠻貊夷狄之邦皆由是禮之行故人說而天下服矣人說而天下服則禍亂何由作禍亂不作則孝弟行而治教興矣此乃先王之所以為燕也嗚呼於此可以觀其禮之盛矣越國公論仁足以救生民之死而義有所不為此事之至難而不可以兩全者也白起破趙兵於長平坑降卒四十萬又前後斬獲四十五萬其殺人若刈草菅然王莽以外戚受封新都遂竊國柄視棄君如土梗弁髦而因以斃之他日賜劍杜郵傳首宛城天道好還無毫髪爽後之誖仁違義者可為永鑒矣隋大業之亂天下豪傑並起各為雄長互相吞噬殺戮無虛日惟越國汪公集果毅保州里遂兼歙宣杭睦婺饒六州之地救生民於塗炭逮天下旣定奉表於唐高祖賜詔褒嘉命為方牧方是時江左之聚兵據土如林士𢎞李子通之徒並稱尊號殘忍苛刻卒覆其宗且禍逮無辜之民公廼保全始終子姓顯榮葢其仁足以救生民之死而義有所不為者也予獨怪唐臣編史比於主簿張金稱輩以賊名之竊考高祖起兵太原旣以私幸晉陽宮人又殺留守取長安陽尊代王侑而假禪受之禮其與宇文化及王世充李軌劉武周薛舉梁師都之流直五十歩笑百歩耳不省已過而以惡名加之他人亦獨何哉歐陽公唐史及司馬公資治通鑑並因舊史本文未之有改善乎吾邦朱子著通鑑綱目凡例凡起兵以義曰起兵其起雖不義而所與敵者不得以盗賊名之則曰兵起故隋末白瑜婆王薄之類人微而事未成則書曰兵起葢深惡秦隋之暴謂人人得而誅之故漢唐之初書法不異乃立論之至公也惜乎越國公之始末史不立傳是以綱目不獲特書以表之耳予故辨而論之以告後之修史者當以綱目為法省試論仲孫蔑會晉荀罃齊崔杼宋華元衛孫林父曹人邾人滕人薛人小邾人於戚遂城虎牢戍鄭虎牢合人心而覇統定據地勢而王制明此春秋録覇之權衡也悼公復覇其惓惓於服鄭至切也而春秋致意於筆削之際葢不以覇統之立而終紊王制之舊也故於戚之會歴序十國之大夫而繼以虎牢之城虎牢在中國則覇統斯定矣及乎虎牢之戍又反而係諸鄭虎牢在鄭王制其有不明者乎吾於是得聖人筆削之㫖矣嘗考隱桓之世覇猶未立也葢周之東遷王澤未冺桓之二年蔡鄭會鄧曰懼楚而未與之也當時雖無覇可也逮乎僖文之世覇業盛矣葢楚氛甚惡侵凌中華僖之四年而伐楚必侵陳蔡以先之結江黄以援之當是時雖欲天下之無覇不可也然申侯之賜曾不以虎牢之輕重也孰謂中國之衰而江黄陳蔡盡折弗支辰陵旣盟之後遂委溱洧之郊為南北之戰場乎夫鄭以成皋汜水之險介乎晉楚之間晉得之則覇在晉楚得之則覇在楚故虎牢在晉而中國之勢安虎牢在楚而荆蠻之勢盛是宜悼公九合諸侯終始致意於虎牢也於戚之役悼公圖覇之初也大而齊魯宋衛之卿小而曹邾滕薛小邾之大夫莫不奔走於兵車之會人心之合者衆矣無何虎牢之築板幹之興有以蔽荆楚之闗而將得鄭人之服聖人曰悼公而謀之至是則覇統自茲以定矣故虎牢而不係於鄭所以責鄭之從楚背華而先祖之地遂為他人之守也至於虎牢之戍悼公得鄭之兆也旣合十二國之君為伐鄭之舉故歸疾於虎牢之城而致完守之計於是地勢之所據者固矣然諸侯之心非欲蔽荆蠻之路而堅壁以守惟欲振鄭人之吭聖人曰悼公之規模若是則王制不幾於紊乎故戍虎牢而復係於鄭所以責諸侯據地扼險以擅列國之地乆假不歸而莫知非有也雖然春秋之於悼公葢責備賢者之意也未幾蕭魚告會三駕奏功惟至誠以待人一洒虎牢之專而鄭自此不復叛二十四年春秋所以美悼公為何如哉奈何戍城不終而以為有陳非吾事平公嗣世私母家而會城杞二十七年為宋之盟一撤南北之藩籬而晉楚之從得交相見雖無事於虎牢之戍而中國之衣冠玉帛悉改元於申息之間矣昭公元年楚靈為申之會合十有三國而用齊桓召陵之禮列國之賢如左師子産皆有獻焉聖人至是葢亦傷之而有末如之何者矣至昭公三十二年合大夫以城成周而守在一國矣自是中國無覇呉楚爭衡而春秋遂終焉由是知聖人惜虎牢之意非為鄭惜也實為中國惜也覇論八則覇者之事假借仁義之名以濟其利欲之私故欲之未遂則汲汲焉謀度而經營之欲之旣遂則懈惰茍且而不復能有為矣由其心偽而不誠是以始終勤怠之殊而前後盛衰之異也春晉侯侵曹伐衛文公重耳魯僖公二十八年晉文救宋攘楚扶中國之已衰却荆蠻之方横視齊桓雖少劣而賢於宋襄遠矣而春秋責之者狥私用詐而設施之際失緩急之序也或謂陳蔡鄭許邇於楚曹衛邇於宋向使晉文遠攻四國無以釋宋之圍曹衛雖不與圍然楚所以横行中國者實得曹而昏於衛故也吁是不然陳蔡鄭許乃華夷之要衝楚必越四國始能猾夏况是時陳蔡鄭許實舉兵從楚文公茍能親帥三軍直造陳蔡鄭許之國都而討其從楚之罪且以扼楚人之歸路則擣虛攻瑕勢如破竹而宋之圍榖之戍將狼狽却走倍日并行自救之不暇我因乗勝以剪其罷敝之餘卒則覇功不勞而定矣今文公内則利於復怨而分地外則狃於譎謀以致楚是以圖覇之始事春秋特書侵以陋之秋天王定使王季子來聘魯宣公十年宣公簡慢於王知有齊而不知有周所以君臣朝夕奔走於臨淄之境者其心必曰濟西之田未復不可不曲意事之而不思魯封七百里之地秋毫皆君賜也而抜本塞源其罪應誅定王始則徵聘於魯中則厚賄於仲孫終則命貴弟報聘是猶為人父而不責子之狠傲乃三揖於定省之常禮而徳色於借耰之微恩也宣公旣不知所當尊而王亦不能自尊矣故來求之書止於文公來聘之書止於宣公錫命之書止於成公非削之而不紀葢王命不足為輕重而王亦不復遣使於諸侯耳寥寥百有餘年而石尚以歸脤録自是天王之名號不見於經矣初稅畝魯宣公十五年三代制田取民雖皆不過什一而其為法至周始詳宻而周盡為人君者茍能謹守其中正之制則可以足國而裕民矣今宣公以簒得國旣不能修徳以弭天灾而感水旱螽蝝之變又不能歛奢以節國用而貽饑饉空乏之憂於是一旦紊先王之制增稅畝之法作法於貪其害有不可勝言矣易世而成公作邱甲而賦民之力有加於古迄春秋之終而哀公用田賦而民財民力殆無遺餘皆肇於宣公之作俑也又使諸國效尤鄭子産則作邱賦魏文侯則增租賦卒至暴秦開阡陌更賦稅而先王之制至今不復豈非宣公首禍以致然乎春秋書初者二初獻六羽喜禮之復正也初稅畝憂田制之變古也美惡不嫌同詞冬公會單子襄晉侯厲宋公平衛侯獻曹伯成齊人靈邾人定伐鄭十有一月公至自伐鄭魯成公十七年王官下臨諸侯景從以却已敗之楚服懷貳之鄭宜若振槁然夏伐鄭楚師至而諸侯還冬伐鄭楚師至而諸侯還望風却走何哉葢厲公旣勝鄢陵驕佚放恣黷於用武慢於尊王是以諸侯無同心戮力之誠鄭不畏而楚復肆非中國之力有不足葢厲公之徳有歉爾有嗣覇之資而以無道行之惜哉城武城魯襄公十九年魯於是時茍能信任仁賢修明政事使民效死而弗去則將制梃以撻鄰國之堅甲利兵而何畏於强齊今乃君弱臣惰安於不道内則疲民於亟城之勞外則徼惠於覇國之援曾無一毫自立之志使齊莊而有報怨之圖則魯之禍未有紀極也己卯地震魯昭公十九年夫地道安静以震動為反常之異臣道恭順以悖逆為犯上之惡是時季孫强僭已甚天之示變欲人君之有所警而以徳消之也昭公漫不知省遄及於難悲夫公會晉侯悼宋公平衛侯獻曹伯成莒子黎比邾子宣滕子成薛伯杞伯孝小邾子穆齊靈世子光伐鄭簡十有二月己亥同盟於戲魯襄公九年冬齊桓之時在於服楚晉文之時在於勝楚晉悼之時在於敝楚葢召陵以前楚人連歲加兵於鄭及次陘之伐屈完來盟而鄭無楚患矣城濮以前楚滅黄而覇主不能恤敗徐而諸大夫不能救執中國盟主而在會者不敢與之争旣又戍榖逼齊合兵圍宋戰勝中國威動天下及得臣敗績而楚願懾服矣迨夫晉師敗邲之後楚復凌駕中華旣縣陳入鄭又滅蕭圍宋於蜀之會奄然以蠻夷之大夫主盟諸夏而聽命者十有一國卒之保鄭以為已有厲公敗之於鄢陵三假王命以伐鄭而終不服悼公復覇鄭與五會之信而猶叛焉悼公欲直擣方城漢水之境繼齊桓帖荆之績則楚寖强盛未肯服義而昔者處父之伐不足以屈其力也欲與之决勝復文公舘榖之㨗則暴骨以逞克不可命而先君鄢陵之勝不足以服其心也於是數伐鄭而不與楚戰使楚人疲於奔命而莫能爭鄭旣有以挫其暴狠之鋒又有以摧其慿陵之志桓文以降於斯為盛故於戲亳北雖書同盟以惡鄭之反覆而會於蕭魚特筆以著其美也然悼公四駕伐鄭唯盟戲不至者因子駟之言而未得志於鄭是以不書至悼公九合諸侯獨於於鄢於戲不至春秋豈無意哉魯公如晉平襄公二十一年春王正月僖公取濟西田則使公子遂如晉拜之成公取汶陽田襄公取邾田則君親徃拜其賜受覇主尺寸之惠而不忘其徳如此也然魯君襲奕世之封端冕委弁以臨於七百里之侯國而水木本原不察所自襄公之立踰二十年未聞遣一介行李至於京師其何以為秉禮之子孫也哉環谷集巻三
