body:
  text: 環谷集别集類四元提要臣等謹案環谷集八卷元汪克寬撰克寬有經禮補逸已著録其平生以聚徒講學為業本不留意於文章談萟之家亦未有以文章稱克寬者然其學以朱子為宗故其文皆持論謹嚴敷詞明達無支離迂怪之習詩僅存十餘首雖亦濂洛風雅之𣲖而其中七言古詩數首造語新警乃頗近溫庭筠李賀之格較諸演語録以成篇方言俚字無不可以入集者亦殊勝之在其鄉人之中不失為陳櫟胡炳文之亞文士之文以詞勝而防其害理詞勝而不至害理則其詞可傳道學之文以理勝而病其不文理勝而不至不文則其理亦可傳固不必以一格繩古人矣乾隆四十六年五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:d6f3b0ff87e5c8062a4648ed472d883629b9afa9016de1f63d93b873f7ae0e2c
