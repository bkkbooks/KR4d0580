body:
  text: 環谷集卷五元汪克寬撰記重建祁門縣儒學記祁門為新安屬邑山竒而峭水清而駛氓俗質朴承平之世比屋絃歌擢倫魁而秉鈞衡者往往有之學宫在邑治之西地勢蜿蜒平岡衍迤旗山左矗筆峰前聳實稱神棲壬辰之變蘄兵蹂躪鞠為茂草邑之遺黎存者百二三大軍恢復後蒞民者爬梳剔抉未遑也嵗昭陽單閼夏四月魏郡鍾侯以廉明剸治之才遷宰是邑訪求遺址俯仰瞻顧喟然曰學校風化之本而廢蕪弗治其何以承宣而布維新之教乎乃剪翳闢基鳩工庀材是秋八月鼎建禮殿侯規畫有度民歡趨之苐以凋瘵之久慮疲吾民且曰徐之勿亟也明年次第創東西兩廡大起三門蕃以靈星繚以周垣肖先聖暨四國公像繪十哲百五賢而舍采焉又明年復建加號制書碑亭及明倫堂齊廬井庖湢之舍百爾具備凡為屋三十有八楹甍甋翬飛丹髹炫爛察祭器之匿於民家者詰而復之缺者補之勸奬邑民助田三十五畝一角一步半嵗入之租三百五十一稱半以供春秋祀事旦望舍采之費集邑氓之頴異者禮聘名儒而訓迪之縣丞清江吳君主簿金陵宣君克贊其成邑之人士樂侯之興文教以陶吾民也乃謀於邑文學李績訓導蔣維楨而合辭徴余言以記於石余惟先聖之道位天地植綱常亘萬古而無斁上之所以教下之所以學惟是而已其遊息在于庠序學孰之間其度數寓乎簠簋籩豆鐘鼓管絃之器其文字則存乎易書詩三禮之所紀載故為之官師以聚天下之俊秀期㑹辨說絃誦歌舞使之深知其意以徼成已成物之功秦毁學宫燔典籍坑儒生廢綱常之道而遂無以立國蘄兵之暴視秦為甚然綱常之理具於人心者未嘗泯也矧兹邑密邇朱夫子之闕里今得賢大夫為之師帥吾黨之士宜日相與朂其子若弟講劘綱常之道以淑諸身小則足以作式而善俗大則推其用施於天下國家庶無負賢大夫之志而亦無忝乎生於朱夫子父母之邦矣侯名友諒字明德聰敏通濟執法不阿其始至也剃蓬藋開市井招逋逃墾荒田捕餘醜之梗化者審理寃抑核實田土招其賦役故民服其教吏畏其明美績彰彰在人耳目而又創公署作三皇廟築社稷壇起譙樓飭郵傳邑之復興實自侯始暇則閲經史詠詩歌其為政蓋有本云梅烈侯祠記至正甲辰豪傑之士生於其鄉厯千百世而鄉之人思之不忘像而祠之是必有其故矣叔孫穆子有言曰太上有立德其次有立功其次有立言魯鄒之祠孔孟以其德也錢塘之祠錢鏐以其功也濟南之祠伏生以其言也梅侯名鋗世居新安之祁門大漢初鄱君吳芮以侯為將軍俾率百粵之兵從髙祖伐秦入函谷關暨天下既定以功封為烈侯食邑十萬户侯故城在邑西十里所居在邑城之東今為洞元觀墓在城南二里今為大悟法萬安寺舊有梅祠在寺之左至正壬辰夏燬於兵明年大梁趙君某來宰是邑亟命重建民歡趨之為屋四楹貌侯其中丹青黝堊照耀炳煥邑氓瞻仰乃礱石而徴余記其槩余謂吾郡有古丘墓三唐初汪忠烈墓在歙北之雲嵐山距今七百餘年陳初程忠壯墓在歙西之黃墩距今八百年俱立廟墓道尸而祝之唯侯之墓自漢逮今千五百餘年而鄉之人思之久而愈篤稽諸漢史吳芮始為鄱陽令甚得江湖間民心侯為鄱君所信任其得民心諒矣然則民之思之不惟其功而亦以其德乎其繼自今治於是邑者亦如侯之得民心則安知他日不以思侯者而祠之哉重建西峯大聖卓錫亭記唐季兵革四興壤土分裂歙祁邑西鄭氏集驍健保閭里化光三年有異人詣鄭氏自稱五臺僧覓幽棲演化之所鄭氏言西峰上元山之杪曠衍數百步羣巘鑱天流泉清激人踪莫至可稱禪居師乃飛錫杖卓立其間鄭氏剃草經營即其地為卓錫亭亭之下建屋百餘楹以處徒衆聞其事於揚州吳王賜額上元寶林禪院師纍朝錫號神惠永濟普祐禪師逮宋紹興五年山前豪右惑隂陽家言撤院屋徙之外半里而逺亭亦毁去後一百有二載當元元統二年秋大旱縣長令命悟法泗洲院僧永泰走西峯祈雨院僧義崇為言師有卓錫故址禱必應如其言邑境大霪永泰遂謀復是亭告諸邑長幕屬捐俸先之令義崇溥勸遐邇之嚮善者粵自是嵗之冬十有二月庚申朔即其遺址首創梵宫且於其下為重屋四楹分命其徒居之以主焚修至元元年秋大旱縣尹趙侯士元躬禱西峯旋塗甘雨驟至畎澮皆盈即助鈔以錢計者千緡有畸畀義崇為鳩工費二年夏四月不雨至于秋七月趙侯復禱應響如初助鈔照前年之數三年後四月厥功告完僧祖心惟孜捐已田八畝并其先師永惠田八畝俾焚修者食其入邑善士程道真亦捐田五畝以佐薰燎之膳且復揮金莊嚴肖像以稱具瞻江德清捐田一畝半助之五月甲子義崇具本末來請記余惟古之祭法能禦大菑捍大患則祀之以其有功烈于民也水旱疾癘之不期非神明智慧捍禦於無形者有以相吾民民孰賴焉余聞師住世自鄭氏之境亢旱請於師輒雨邑大旱令往禱之又雨揚州旱三嵗並禱羣祠弗應聞歙神汪王靈貺夙彰乃命郡將陶公雅禱之期三日不雨毁厥祠其夕汪王感夢陶公而告曰吾不能致雨西峯有大聖者曰水晶宫菩薩常役五龍化雨不由天降盍往求之陶公遣介致請於西峯無何揚州一雨三日若是則師之禦菑於民也舊矣安得不屋而祀之尸而祝之究竟始造則飛錫所稱實昉至此山之遺躅也蕭梁武帝時志公和尚與白鶴道人愛舒州潛山之竒絶帝令各以物識其地志公飛錫卓於山麓遂築室於上及今以為故實豈以西峰之為院而舍卓錫之基乎矧師之靈響唯雨最著昔景泰禪師卓錫於羅浮泉湧數尺迤今不竭因卓錫以為壇則雨之應也又奚翅寶錫之泉乎由是知西峰之有卓錫猶水木之有本源也向也蓁棘莽然今也遄復舊觀瓊榱翠壁復叠崔嵬綺疏欄楯玲瓏嚴飾者此前日之荒烟而暮靄也範削汚繕金壁綵繪軒蓋床座精麗華美者此前日之隕碌而苔甃也昕鍾夕鼓鯨呿鼉吼同聲作禮稱揚贊嘆者此前日之狖鳴禽哢而狐兔之隱處也肇謀者永泰而義崇是克終焉於法宜書雖然師常告鄭氏曰貧僧三界內廓然無纍豈徒住院哉是則棟宇象設於師何有禪心空寂本無一事豈若凡夫妄生顛倒起貪嗔癡嗣其教者果能掃除浮念浸入淨覺則求之吾心心則相符燈傳無盡將綿之億千萬世而遐久矣義崇曰然即以余言勒諸石是年八月十五日記重建淨菴碑記塔山菴距邑西二十里曰石門村口僧惠滿佛印大師與丞相汪公先世甚善公微時藏修之所以淨菴二字易之前有諸峰秀列下有石門對峙石礄石磴石佛石池石瀑石岩石鼓石鼎皆其中之所有也深進六七里曰石門寺其山水猶甲勝一方與淨菴戶籍田産合而為一自觀化三年至於今日凡興廢有三余按淨菴碑記厥初有僧曰圓明性善首闢蓁蕪作新梵宇鬼神受祉黎元樂康保祚延洪率由此道逮宋紹興三年弗戒於火殘甓斷礎無孑遺者有僧曰祖謙祖禹募工興復溥勸鄉里之向善者樂為之助曰殿曰門曰閣曰廡曰方丈曰庖庾當元元統二年屋老不可支僧惠明惠逺殫智畢力節縮浮費告所還往助者益衆蓋正殿八楹觀音閣八楹兩寮各十二楹門屋十二楹方丈庖湢如舊東偏立丞相汪公夀祠塑像於其中以陳氏二先生侑焉公嘗館於是石墅仲容偕藤溪可大二陳先生游於館下究明道義以偉於世崇寧中公登第建炎間仕至檢校太傅保信軍節度使提舉臨安府洞霄宫新安開國公食邑二千二百戶實封二千一百户卒諡忠定公公嘗手著有表章奏議雜文數十卷中興日厯五卷春秋大義十卷文集三傳本末為三十卷藏於菴西館與夀祠以傳不朽焉昔公除觀文殿大學士知洪州仲容先生以龍溪縣尹請為之幕孫良弼先生與藤溪定宇先生互相師友於其間惓惓仰慕先業而不懈其尊賢尚德之心也良弼先生割田二十畝畀僧崇德奉守為增葺費王伯俞亦讀書於此仕至直閣有聨句云昔年去學深山寺今日來游小石門尤不可不知其所自明年秋七月厥工告完冬十有一月丙子僧至誠具其事來請記余故不辭為之識其本末而并記此意以示後觀者云是為記萬川家孰記古之教者家有孰非家有孰也二十五家為閭閭同一巷巷首有門門側之堂謂之孰仕焉而已者教於是焉朝夕出入恆受教於孰而其所以為教者皆因性誘民而納諸至善之域禮鎔樂冶以成其德以達其才敬敏任恤則閭里書之孝友睦姻則族師書之士生斯時不待捨去桑梓而有學有師其人才之盛風俗之美非後世所能及也井田既廢閭里無學士常輕去鄉土而事逺游行之修窳無所於考教之者以訓詁為賢學之者以葩藻為功非惟無以淑其人而且斫喪人之本然之性矣近代以來濂洛諸儒先繼出吾邦紫陽夫子集厥大成揭晦冥之日月開千載之盲聾於是六合之廣四海之外家誦其書人攻其學而吾邦儒風之丕振俊彥之輩出號稱東南鄒魯遐邇宗焉比年矛㦸搶攘列城兵燹學者逃難解散非唯里閭廢學而郡邑學宫悉為丘墟此家孰之所為作也余宗友德懋久從余游而有得者世居休寧之萬川慨庠序之不興而士習日靡乃以所聞於余者居家教授集親族閭里之子弟若干人旦夕修讀以自朂亦古者家孰教民之遺意也遂名其堂曰萬川家孰請余書其額而併記之余曰人性之初渾然純粹無間古今果能養正以希聖功則成已成物厥效難量豈特無負於余而實有光於紫陽夫子之闕里矣尚勉之哉志學齊記聖人之道淡而寡味然辟之菽粟之在天下不可一日而舍也舍是則無以有成也世之人有志於聖人之道者蓋夥矣然未之或知訹於小藝惑於旁蹊則是志之未立也志茍立矣朝勤而暮輟一暴而十寒則是志之未誠也志茍誠矣覽之未博習之未熟未聞其所未知未勉其所未行則是志之未篤也必也求之方䇿誦而復焉思而繹焉凡理之所當然者必法乎先哲而反諸身本無往而不至也然後出其餘以肆力於為文推其用以顯於時則可謂充其志而於學乃克有成矣海寧任生元年近弱冠而請學於余氣清而質淳既而以平日講劘之書與之讀之以余之所聞於大人先生者與之言之喜其有孳孳未已之意而果有志於學也又明年請名其書室余嘆曰書室之名不必他求也志於學而思弗懈其進詎可量乎客有詰余者曰十五志學東魯聖師之能事也曾謂初學者而可語是乎噫人皆可以為堯舜塗人可以為禹矧聖師斯語實為後進矩範俾由階而升堂沿流而達海蓋猶射者之求的行者之求返於其室也寧令自暴自棄而勿以是為凖則乎余早蒙父師之訓頗知嚮方長而考德問業於鄉校既壯而游於四方乃徐有得而不自知其至猶未也余又安得不為生朂之諄諄以誨之哉客曰以俟之而蘄生之速成也既以告於生遂書為記邑東平政橋記為政必務知要知要則所施者寡而所濟者衆或不知其要而以私恩小利悅其民則心勞無窮而力有不贍烏得人人而蒙其惠哉柔兆敦牂之嵗夏四月宜陽余侯來尹祁門值縣屢經兵燹百廢未興邑東平政橋舊為石􅀈十有七髙不尋丈嵗久石􅀈頺潰存者不及三之一石梁毁折存者七之二每架木以補其缺春夏當潢潦稽天奔湍怒迅操渡舟者稍失便卒致沒溺民甚病之侯惻然興懷召邑之耆老諭之曰橋之廢可復興乎僉對曰邑遭時變石工無存他山之石微良工莫能致侯笑曰有是哉若曹之弗通其變也明年訪歙邑石工之良者得十餘人㑹度其費工以日計者若干米以食計者若干首捐祿米為之倡集邑之好義者隨所助相地勢之宜躬為之規舊石􅀈咸十有二增髙一仞有半釃水為六道橫以巨檆縱列株樟叠石平甃其上左右欄杆以防其危於是東西行旅之出於塗不翅履虹霓而步霄漢莫不唶唶稱美匪惟祁民免病涉之憂而遐邇之人被侯德於無窮矣復創亭於橋東肖普陀大士設茗飲以蘇道渴經始於丁未八月落成於戊申三月邑耆老謁余請曰橋之建不可無記先生起家科第能文辭二政於下邑且與侯同居江西交誼尤篤願有述焉余惟余侯之為政知要而濟物之功甚博德之及人蓋倍蓰於編竹橋而渡蟻者於法宜書侯名寶字鈞玉慈祥愷悌正大公平其治祁也明而能斷寬而能惠招徠流離俾墾荒土諭民以理簡其獄訟稽物力之豐嗇以均賦役故有所興作民樂從之甫三期建鐘樓廣公署新郵傳易坊題更排栅創三皇廟門暨城隍忠烈祠築堰渚導故溪循祁山之麓俾民永無水患暇日數臨學宫勉勵諸生節嗇既禀刋書於學以惠多士故兹役大有功於民余雖與主簿晋寧方君崇禮幕職金陵髙君仲輝贊其成而侯之功居多董其事者耆宿謝惟告王子椿汪文炳釋文穆儒職胡泰初也謹叙而銘之銘曰祁門為邑清溪四環石梁絡溪接於祁山嵗厯時遷欄摧梁斷百澗合流洪濤汗漫春夏之交濟以漁舟斯須弗謹應龍之求余侯蒞政惕然矜之鳩工架梁不日成之爰作𢎞規革易古昔疏其溪流崇其叠石盤根鐵鍵幹地玉甃鰲負虹舒鱗比雪搆層欄橫楣影映波光行者履坦游者相羊履嶮而夷登髙若卑萬辭贊美齎咨噫嘻作亭橋左茗飲斯設勞者以息渴者以啜鑿石祁山勒侯之功顯顯令德與山無窮聚德堂記謝氏為祁門著姓擢進士科宦通籍者代不乏人樵隱翁問學該洽豪俊過人少嘗筮仕馳騁朔南中年提領浙右營田厭俗而歸子原其仲子也秀頴溫粹余嘉其能纘世業以弱女女之比年時變搶攘干戈充斥子原卜隱居於邑西之小壺天晦跡清修幽棲甚適洪武初元冬十有一月既望子原請余過其居相與燕樂於時其季父逸齊暨其弟子英從弟子溫咸在焉鄉之人聞而見之者皆曰此德星聚也安知無太史之言於上乎於是子原因鄉人之輿論扁其堂曰聚德而求余記之余屬負兹未遑也明年余與金華宋先生被召纂修元史子原亦因事至京師先生篆書二大字以遺之而子原求記彌厪余惟天之生賢實由其祖宗積慶而致然也樵隱翁之大父彬彬儒雅司㑹鄉校未暢厥施逮樵隱益精鉛槧挂冠之後與同儕歃盟詩社吟風咏月有少陵樂天之風雖青雲之翼弗展其將修飭於身以俟後昆顯榮而食其報乎今逸齊皤然魁岸作範邑里羣從子姪英傑林立子原三子長曰祜次曰祐次曰祀皆階庭玉樹成吾家之宅相必斯人也是為記槐庭記同邑王子正甫代居邑治之西偏石山之右左挾旗峯前挹文筆地勢崇髙閶溪環繞蓋山水之最勝處也邇更時變海宇寧謐創新居四楹旁植巨槐數株櫩楹𢎞敞軒牖疏達圖畫布列筵几秩然乃摘東坡翁三槐堂銘槐隂滿庭之語扁曰槐庭翰林學士金華宋先生篆書二大字揭之楣間而請余記余按王氏為祁門大姓析居邑之平里大倉者子姓蕃衍擢巍科登顯仕者代不乏人子正自其九代祖繇大倉徙居石山詩禮傳家奕葉彌盛其先君子福卿積善種德餘慶流芳子正甫善繼先志不懈益勤治家井井有法羣從昆弟怡怡如也與人謙謙盡禮一介不茍取於人昔兵部侍郎晉國公修德於身手植三槐於庭云其子孫必有興者而其子魏國文正公位登台鼎富貴夀考傳其子懿敏公為工部尚書與歐陽文忠公余襄公以直諌著名當時今子正父子踵美階庭玉樹芝蘭秀頴林立吾知王氏之昌將自兹始矣余嘉子正之嗜善也於是乎書竹徑齊記同郡蔣之翰乃詩書世家曩從吾游刻志於學邇年隱居黃山橫經以迪後進嵗在閼逢執徐魏郡鍾侯明德來宰祁邑徴之來歸館於縣庠訓導厥子及邑氓之俊秀隙日則謁余書舸而講明至理之肯綮焉值黌宇新建侯屬之翰董其事厥功惟夥明年部使者至學欲舉而用之之翰謝不就暨鍾侯秩滿承府檄偕侯赴省中書博士茂清迂叟并館閣諸公多以詩贈之無何言還築室於泮宫之側讀書其間蚤夜檢討既而請曰維楨慕鼻祖遺躅闢徑書室之前藝竹數十百箇春則植樊於徑之兩旁護籜龍矗矗髙並欄楹如碧王列與吾為侣琅玕玳瑁光照几席夏則憩層影讀書其下好風徐來清致孰偶秋則聆戞玉聲簫瑟與咿唔應翕不翅韶濩冬則皓雪散積瓊林瑤樹猗儺其枝黃卷映明未有囊螢鑿壁以故雖居闤闠之中而有山林意趣先生盍賜之記以朂其不逮俾書之楣間以貽遐久則受先生之賜無窮矣余曰噫古之君子比德於竹其䕃物似仁抱節似義遇風磬折似禮中虛似智而家兖州使君開竹下三徑其亦有契於是乎植物中之清髙正直者其孰有越於是者乎而不慕晉賢之曠達唐逸之沈飲渭川千户侯之貨殖而惟積學是務則他造詣未可量也豈直兖州之德業而已哉既以告之遂書其語以為記東野堂記謝為祁門著姓繇前宋而來擢巍科躋膴仕者代不乏人奕葉子姓如芝蘭玉樹秀頴林立南渡後有諱璡者由特奏名仕龔州助教嘗從吾紫陽朱夫子講性命之㫖吾友子溫其五世孫也早嵗侍其從伯父筠軒翁同學讀書接人溫溫其恭時值多艱喜遁丘園以自晦比年海宇廓清九域寧謐築室於先人故址扁所居之堂曰東野內翰潛溪宋先生為之篆二大字以刻其額而徴余文以記之余曰昔孟貞曜以東野字行子得無有慕藺之心乎子溫嘆曰非是之謂也吾先子嘗名之曰和而父師字之以子溫夫青陽開動溫然以和於時為春春者發生之時也皇甫氏世記云春之位在東方蓋君子體仁之意天地生物之端故以是名題吾藏修之所而朝夕瞻望蘄以廣愛之功云耳先生盍為我記之且以為朂焉余曰噫而祖髙卧東山未幾登彝鼎以安天下今子隱於東野之堂而有澤物之志吾知他日逺大之業必將復祖氊而顯名江左矣余喜謝氏之有子也於是乎書汝舟軒記一齊吳君得隙地於書孰之西偏治軒為諸子藏修之所其袤四楹其廣一尋有半崇稱是上閣為篷前除為欄甍棟髙明窗牖疏達肖舟之制而丹青飾之簷之外適當山阜甃石圾以樹佳花美木而嵗寒三友具焉環列棐几圖史左右絃誦休息若放翁載書文剡中次於水裔而山林掩映玩而忘歸也良辰清夜壺觴嘯詠若東坡誦詩赤壁扣舷而歌風恬浪止泛乎中流也薄暮缺伸馮眺仰視又若逋仙泛船西湖艤篙徙倚逍遙相羊不知日之云夕也遂命之曰汝舟而請余為之記余按舟周流也其用周流而無窮也大易之象凡濟險必曰涉川則水之有舟實濟險之具也今夫溝瀆之微洲渚之隘洪流齧岸奔湍吼雷孟氏之徒杠已摧季路之馮河莫涉於此之時茍非舟而奚用至若大江之浦溟海之洋積水湠漫濁浪排空靡蛟龍以梁津無神人之鞭石於此之時又非舟而奚用商書曰若濟巨川用汝作舟楫諒矣哉今君之子方且航學海而浮游聖道之淵余願其以存誠為檣以主敬為舵以詩書為橈櫓以仁義為維纜以勤力不息為席帆以躬行踐履為棹楫然後以文章詞藻為波浪則將紹濂洛而溯洙泗異時駕巨艦鏖戰突出於浙水千艘之上而為明時濟世之用則商之傅說不得專美雖然善其事而不利其器非良工也必也擬時而後應時至而後動則翼然如鴻毛之遇順風而一日萬里詎可量哉牽挽撑拽疇昔叵怠其尚有戒君之子懋勉之橫野樓記居曠衍者乏佳賞處僻幽者絶遐觀豈天實嗇之地勢然耳今夫闤闠之間都邑之㑹搆重屋而登覽焉闊視宇宙之大千里一瞬無有疆域而峰巒之竒滅沒蔽虧邈然不與目接不翅燕越至於穹崖巨谷荒絶之顛雖有重岡復嶺峭拔險異而狹隘迫近雅意莫舒欲命夸娥負之而不可得也海寧為一郡山水之勝邑人余元之居城東偏不僻不曠樓於所居之側良辰美景夷猶其上北望則松蘿天寶蜿蜒旁薄而浮丘三十六峯逈出天際南則芙蓉諸岑嵳峩森立浙江之源帶其前奔流若馳斷崖岝岑怪石錯峙西則氓居官邸甍瓦低昻櫛比鱗次其東則原田井畫喬木衍迤晨霏夕靄噴欱摩蕩輸英騁秀層見叠出於軒楹之左右乃命之曰橫野前提舉貫公子素與書其顔介友人汪生德懋徴余文以記之噫兹樓倚於㕓市而有僻野之致焉鄰於喧囂而有閒曠之趣焉二難之并孰與為比何時披鶴氅步上東門訪元之之居相與倚欄遐矚僎風介月撫今懷古掀髯而笑抵掌而歌傾駭山川之神當援筆而重賦之皆山樓記古稱新安有佳山水而祁邑為尤東則祁山若令字之旗長杠斜倚而綴游委蛇孫仙棲真之嵓逈在天際西則石山羣巘若萬馬自天而下扶輿清淑之氣育秀凝翠崔巍崒嵂左右衛從為縣治千載之基北則石鍾諸山或如屛几或如倉囷或如帷帳嶔崟而環拱南則白石之峰層巒叠嶂朝簮文筆羅列玉筍之班峭拔可愛邑人胡伯善世家詩禮隱於㕓市中闤闠以居創重屋四楹甍棟髙明軒牖疏達日讀書以自適暇則馮欄觀山娛心悅目乃摘歐陽公環滁皆山之語扁曰皆山而朋儕因以是稱號之且徴余文為記諸楣間余惟易之八卦在艮為山而重艮即皆山之象也吾東魯聖師贊易之彖曰艮止也時止則止時行則行動靜不失其時其道光明伯善抱才韞玉藏器於身玩遺經之至理慕聖賢於前古不求聞達合於大易艮止之義而覽觀山中朝嵐夕霏噴欱吐吞千態萬狀殆與塵世浮沉盈虛代謝實同一軌而山之青青不改並堪輿相為悠久髙趣逺志樂山之靜夀母年踰七袠怡愈養志其纂先緒而貽後昆詎可量哉余嘗過伯善之居見其前除植梅數株佳致匪俗因以梅軒字其堂而篆四大字以遺之并書以為記西南林壑樓記郡北三十里有山曰鳯凰余友吳仲實既封其親於山之麓遂廬於先塋之側復即兹山之陽以為别墅焉繇先塋右度小澗縈紆灣澄夾徑樨檆數十本剃蓬藋築室四楹室之北沼圃廣袤可百餘步藝梅李杏梨榴棗栗枇杷林禽如干株雜置竒卉植竹如樊栁槐鬱鬱圃北為屋四楹以宿賔賔館之北井方池渚源頭活水池中纍土成方州重槐婆娑繚以欄檻洲外碧蓮孔茂蓮之四旁編篠養魚數百頭圉圉洋洋北之東並徑為小亭以遲賔扁曰問津室東南重屋四楹窗牖疏達貯書數千卷留名士觴詠觀書鼓琴並室闢徑詰曲二三百步暨山半為臺以憩游者扁曰笑閒步山之顛岡阜四環巨松彌望清貫四時諸峰獻狀黃山六六宛在眉睫瑤篸玉笋秀竦可愛暇日與客登重屋而遐覽西則竒峰屏列茂林演迤蒼翠薈鬱南則大壑廣衍花草芬芳壑之旁有巨石髙四五尺上平如砥可坐可倚可琴可棋乃扁之曰西南林壑而謁余記之易於蹇解皆曰利西南西南坤之方也山川地之文也大山巑岏而有平原之映帶廣谷寬閒而近喬木之葱蒨則竒勝岑蔚莫斯若矣噫嘻林原丘壑農樵牧豎日相羊其間顧勤耒耜勞斤斧出入榛棘叢血濺趾脛目不識丁字罔知詩書陟峻涉深奚悟登覽趣悟是趣者須學士大夫然徼升斗祿馳騖名郡大都苟取青紫榮耀縱有田園臺館踪跡罕至孰若吾友屣棄簮紱逍遙物表極山水之玩不吝餘資購法帖名畫金石古器道釋遺文積疊編簡以自娛樂泊然無秋毫世俗慮其賢於人逺甚余與仲實以文墨交殆三十稔實余之心友愛其境髙其行於是乎書環谷集卷五
