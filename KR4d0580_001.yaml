body:
  text: 環谷集巻一元汪克寛撰賦夫子之牆賦敏學主人與博古先生遊於尼山之麓曲阜之墟造孔林之闕里瞻𤣥聖之攸居楩楠連雲而薈鬰檜栢叅天而扶疎蹕亭嵯峩而倚空杏壇甃甓而荒蕪列横序之層搆峙鉅殿之中巋屹崇門之突兀繚周垣之廽紆主人喟然而嘆曰端木子所謂數仞之墻其在兹乎吾子衣蹁躚之逢掖冠崔嵬之章甫塗抹丹鉛摹冩今古行式淵騫言稱求路盍為我抽思逞辭飭章繪句鋪張𢎞麗之規緣餙高廣之度極詞人之炫燿亟援筆而為賦先生曰嘻夫子之墻豈今之所謂墻哉粤自二龍繞室五星降庭萃大塊之清淑會元氣之晶英纘聖神之華胄集條理之大成拓天下之廣居開異代之文明夫是以覆㤗宇以為櫩立人極以為柱存至誠而為基凝至道以為土文章為之華餙德業為之培累貫一理以為楨崇萬善而為堵仁義中正乃其板載之方詩書禮樂乃其畚插之具不思不勉初何事於經營彌高彌堅又奚煩於削鏤悠乆無疆乃斯墻鞏固之迹博厚配地乃斯墻延袤之數葢非有馮馮之聲俾人得而聞又非有甍甍之形俾人得而睹子輿守約而獨詣復聖瞻前而無方衛贛及肩之淺室仲由駐足而升堂彼州仇之何人固無惑乎不足以窺聖域之𣺌茫主人展然而笑曰繄尼父之誨人若太虚之時雨示後進之表儀固無行而不與夫豈强蔽於垣墉岌岌乎城堞之扞禦使升高而無階漫顒顒而延竚先生曰非也夫物理之不齊亶鉅纎之異宜凡藏蓄之廣博必高深而難窺倘其中之狹隘外卑薄以奚疑茍處下而眎高曾何異乎斥鷃笑大鵬於藩籬主人於是與客躡高􅀈眺清賞闢重扃披宿莽歴石級而歩趨睇宮庭之峻廣扣玲瓏之綺疏拜蒙倛之遺像覽碑碣之籕文聆絲竹之絶響爰從容而詠歸挹清風之蕭爽無逸圖賦粤有好古書生博雅搜竒閱几上之册絶編中之韋覽商周之逸蹟睹漢唐之懿儀渉獵前昔究竟無遺秘閣主人見而問之曰子亦嘗聞唐人之無逸圖乎演徃聖之箴規易明君之玩娯維良相之偉制實盛代之𢎞謨也盍抽子秘思攄子遠謀探訓詁之𦣱闡方策之腴摭芳逞妍而為余賦諸書生曰唯唯繄唐中葉實惟明皇式遏冦攘克正紀綱嗣睿而帝旣安且平虎皮包刃鵠板收英爰得宋璟股肱之良敷陳治道討尋憲章璟乃思曰繄人君之履位如臨深而捧盈宜處逸而思囏宜旰食而遑寧於是寫周書無逸之圖為唐皇克己之銘不餙不文不丹不青惟取周公旦之數語所以戒成王之守成者也念聖人之遠慮懼嗣王之暇逸獻無逸之嘉謨陳艱難於稼穡於以戒夫怠荒於以勉夫兢業考歴代之隆規敷祖考之𢎞績嗚呼七歎感慨乎今王之心不敢五言鑒觀乎前哲之德于觀逸于遊田再四為之丁寧生則逸生則逸反覆為之戒飭陳享國之乆近論得夀之隆嗇是皆以昏為懲而以善為則也璟之圖之必精緻而詳極明皇觀之宜亦感省而修慝矧夫九齡進金鑑之録藴古遺大寳之箴賢臣交納乎忠言賢君亦謹於操心故廻奢為儉戒荒為勤燬殿庭之綺繡卻錦坊之織絍是宜開元之盛治遂與貞觀而比倫也夫何賢輔旣徃侈心遽萌肆情慾於玩好易山水於扆屏霓裳羽衣稔宴安之鴆毒槃盂觴豆忘古道之典刑弗致蕭墻之警卒罹馬嵬之行葢無逸之戒明皇不能愼終以如始是以樂極而患生方今聖皇宵衣圖治篤緝熙之學繼纂成之志有臯䕫以論思有伊呂以獻替固不假宋璟之為圖而可以軼成周之盛治也秘閣主人展然而笑曰子之述是葢將致吾君於唐虞躋斯世於雍熙異於圖混一而賦大都陳謟頌而翊佞諛者矣吾為爾歌之以發其餘歌曰公旦輔周厪奬勸兮無逸數䇿埀寳訓兮宋璟制圖條不紊兮惜哉唐皇功虧九仭兮猗歟我皇勤勞克謹兮保惠黎民延億兆而有永兮宣文閣賦有序皇帝九年制作宣文閣於大明殿之西北皇上萬幾之暇御閣閱經史以左右儒臣為經筵官日侍講讀茲閣深列紫御傑出青霄朝野傳誦瞻望踊躍布衣微臣欣幸睿聖崇文致治之隆曠古莫及敢竭蟻忱贊揚之私拜手稽首而獻賦曰鰲極立兮時雍四海一兮書同作神京於燕薊貫北辰乎天中懿聖皇之御極焕離明以當空復至元之盛治繩神武而丕隆淳風沕穆膏澤涵洪文燄烜赫乎扶桑崦嵫之域仁聲馺㳫乎濮鉛祝栗之封旣而乾符昭陳神珍聿錫文德誕敷皇圖廣闢建傑閣乎中霄屹大明之西北揭宣文之嘉名示𢎞謨於萬億爾乃凖水臬恢鴻基公輸獻巧匠石殫思陶人運其埏埴玉工效其雕幾豫章松栢剪千尋之夭矯金璧銀鏤致萬里之瓌奇斧斤振鏗鍧之韻礱斵極精緻之宜四方子來經之營之羌不日而告成儼崔嵬而峗巍觀夫岧嶤嵯峨崛岉瓌譎搆複桷而重櫩邈希世而特出麗不踰奢儉不及質璇題翠甓崱繒綾而龍鱗蛟吻踶甍奐翬飛而跂翼綺疏鏤列錢之玲瓏藻井粲菱荷之繪餙玉鐺璧英瀖䕶而零亂隋珠明月照耀而恍惚瓊戸耀孚尹之璀錯金鋪響連環之複叠浮梲㠥􅞸而星懸鬬拱衡縱而斗折枝撐􅒎枒而斜據芝栭攢羅而戢孴曲折要紹而環句層櫨􅛡佹而岌嶪交龍纒楣横飛雲之梁棟䨇蜺蟠礎聳擎天之柱石朱楣結曲而縈廽鉛砌晶縈而煒燡雘垣流丹以周繚翠栢樛枝而行立於是聖皇駕玉輅張龍旂展乎國容輝乎皇儀望舒陪夫左馭屏翳導夫先馳鳴和鸞之鏗鏘服衮龍之陸離御斯閣以問道闡經幄之𢎞規帝幕高懸天顔孔怡列儒紳而進讀對黼扆之嚴威舒緗帙之蟫蠧擴六籍之精微咏仁咀義聆天語於羲昊言温氣和陳古道於臯䕫殫詞臣之忠藎恢聖學之緝熙内府頒竒珍於翠釡上方瀉甘醴於玉巵和氣春融起天庭之黄色文星環拱映帝座之清輝想夫聖躬聽講之餘臨眺倚徒接羲娥之耿光納穹堮於無際東望則延春之閣崔嵬峥嶸横絶天半窅邈觚稜西瞰玉德秘殿􅀈曜月朗渺太液之輕漪涵天光而滉瀁北瞻則萬歳之山㠎嶫崷崪厓洞谽谺草木蒼鬱南眎象魏岝􅣉朱闕巉嵓嫓黄道之啓途列閶闔之九闗猗歟休哉卓彼斯閣曠古曷偶奠億代之基圖闢八紘之戸牖萃鴻碩以講劘稽典墳於蝌蚪於以廣睿覽之明極乎有截之垓埏廓聖德之聰逹乎無垠之宇宙思昔石渠天祿徒以貯簡編之糟粕麒麟凌烟秪以圖輔翼之英雄曷若聖皇之制作宣人文於萬代致文治於無窮彼𢎞文館聚四部之奥博白虎觀辨五經之異同又烏足與聖世而比隆也哉廼舞蹈而歌之曰於穆聖皇亶聰明兮雲漢昭囘昭萬方兮嘉惠兆人臻羲皇兮傑閣中天討憲章兮鵷鷺章逢侍帝㫄兮載稽經訓研籀倉兮治功彌隆追虞唐兮人文宣朗貽億萬世而無疆兮皇極賦繄鴻濛之未鑿兮閟瞢闇之昏渾迨太極之肇判兮廓㫄魄而昆侖崇與卑之旣陳兮繄人文其朗宣孰主張是兮總九野之元元偉睿智之首出兮奠中區而建極履大寳之巍巍兮秉元聖之休德侔大學於虞后兮至仁嫓乎唐國作庶類之標凖兮靡不於斯而作則實無偏而無陂兮恆特立乎中央羌至極而莫踰兮厥表正乎四方東西南北各止乎是兮俱輻輳而瞻望猶北辰之居其所兮爛衆星之環拱屋中高而四下兮揭乾棟之獨聳任斯道而弗頗兮邦總總而歸徃慨余懷古先兮屢翹首而企踵禹濬川而疏洛兮睹神龜之負書背文自一而至九兮亶后皇之錫疇稽皇極之位於何而存兮儼五數之中居統八類而為綱兮挈裘領於襟裾歴夏曁商兮斯理湮汨嗟周王之有道兮纘禹舊服釋纍囚而訪箕兮演大法於簡策陳名言於不朽兮皦中天之日月道不虛行兮在乎其人武得之而致理兮綿八百而永年五行順兮五事察八政厚兮五紀協斯皇極之所以立三德以乂兮稽疑以明庶徵允念兮福極於以勸懲斯皇極之所以行噫後世之昏迷兮彛倫攸斁天不畀乎此疇兮乖徃軌於初古舉世瞀瞀而倀倀兮象緯黯其失度嗟大中之是訓兮襲舛譌於訓詁彼優游而姑息兮胡弗遵於王路宜孝元與代宗兮竟莫延於歴數惟蝌蚪之未昧兮尚斯文之可徵仰聖皇之御極兮踐五位而文明由聖道之正直兮粤作則於八紘述敷言以為世訓兮貽億代之媺聲顧鯫生之何幸兮將觀光於上京叩帝閽而獻頌兮慶四海之咸寧歌曰我皇在上亶明聖兮建其有極德至盛兮參贊化育天地並兮四方取則無不敬兮寤寐禹箕為龜鏡兮億萬斯年延福慶兮紫微垣賦璧月皎兮朗明銀浦爛兮晶熒輕飈恬兮肅清纎雲收兮窅𡨕若有客兮游木天陟仙瀛瞻太虛仰圓靈顧謂翰林主人曰吾觀紫微之垣天皇之庭高高而在上遥遙而莫登願先生搜典籍之賾隱闡象緯之縱横攄藻麗之錦心賦鏗鏘之金聲某也將屏息而竢傾耳而聽主人曰唯唯葢聞紫宮巍巍天皇是處大帝之座尊居其所抱以勾陳之六珠佐以天極之四輔燦燦其後者椒房之后妃燁燁其前者青宮之儲副尚書大理炳煥而森羅柱史女御輝光而㫄午運轉於百餘萬里之外在中而弗移周廻於七十二度之間常現而可覩繄榮衛之昭布儼七八之相聯環乎皇極之居斯謂紫宮之垣左樞右樞夾乎離南之穹門上丞下丞攝乎坎北之重閽上宰少宰以對待少尉特立而聿存上輔少輔煒東西之次列上衛少衛分左右而屏藩是垣也覆以華葢之輪囷植以天柱之突兀黄金為城塹以雲漢之津白玉作京闢以閶闔之闕叠銀礫之層層樹白榆之歴歴匪築以干戈河圖之倚杵匪甃以五色女媧之鍊石傳舎庖丁之宻邇内階天府之相逼瑤宮玉臺岧嶤乎其中廣寒清虛暎照乎其側故至尊之覆位代紫宮以居中師保耿台躔之拱侍臣鄰炯郎星之列從奎壁炫文章之府執法肅御史之風由是天帝之垣環衛太一於高空萬國羣黎林林總總以仰時雍之化豈非微星之萬一千五百二十旋繞而無窮若太微象明堂之房天市嫓權衡之宗雖皆帝座之所寓羣星之所叢或隣翼軫之墟或貫房心之衝曾未若紫宮環衛於北辰之扛轂五緯連珠之所拱向列宿轑輻之所會同也客聞而歌之曰我皇聖明兮握符御極賢才並翰兮光華赫奕紫辰倚空兮金墉嶻嶪萬國歸心兮黔黎載德又歌曰丕圖𢎞開兮景星耀輝帝垣昭晰兮中天巍巍至和坱圠兮玉燭獻竒樞軸旋轉兮萬夀無期歌畢月掛觚稜露寒秘閣璇杓低昻玉繩廻薄立清寒於掖垣仰紫微於寥廓鳯凰來儀賦有虞起兮歴耕重華煒兮文明袗衣絢兮斧扆時雍變兮八紘命后䕫以和樂奏韶箾之九成致靈鳥之並集舞威儀於彤庭想夫鳴球戞擊絲桐振響摶拊胥諧咏歌迭唱先祖洋洋而格思羣后逡廵而揖讓宮縣斯設簨􅒶維樅峙崇牙之㨗業蔚樹羽之衡縱瞽矇擊柷而作作眡瞭播鼗以逢逢隂管駢歙於鐘笙金奏鏗鏘於大鏞變徵旋宮調律同之䃂韽執干秉翟列舞佾之從容導大塊之至和致象物之感通爾其九奏爰終于飛翔翥粲粲其章翽翽其羽覽德輝於千仭聿廻臻於殿宇九苞炫爛羾黄扉而裵回五色毰毸歴玉階而延竚儀容肅肅而雅馴翼衛蹌蹌而獻舞德侔君子恆揭義而負仁音協黄鍾嫓鏗金而考鼓其為物也禀乎太一之粹孕乎丹穴之峯距弗履乎弱草咮弗啄乎生蟲朝憇崑崙餐琅玕之瑣琗夕游縣圃飲玉池之冲瀜首昻金鷄之喙尾曵鯨魚之踪背靈龜而頷燕後祥麐而前鴻飛禽三百有六十而唯是之為宗爾其九官都俞四岳輔弼洚水懐襄而底平烝民艱鮮而奏食八埏皥皥而雍熙四海安安而寧謐帝舜之德殆不翅𤣥渾之并包與方儀之立極是宜太和之音始迭作於九變而太平之瑞駢雄雌而下集昔者軒轅施德聿巢阿閣之顚厥後岐昌修政爰止高岡之側羌至聖之致瑞實後先而同轍迨夫時乖政熄代變風漓尼父興不至之嘆接輿歌德衰之辭楚人山鷄賜千金而誨謟西都神爵驚屢至而夸奇蕭史神仙之恢詭苻秦謠䜟之支離偉我皇之聖明協重光於虞帝大猷昭黼黻之文雅樂應簫韶之制賜湛樂於吾民陶太和於斯世臯益接武而論思稷契駢肩而獻替願羽儀於天朝効鳴陽於盛際天府賦維蒼姬之肇造兮臻泰和於寰宇恢輿圖於八紘兮邈聖德之涵煦偉菁莪之樂育兮烝俊髦之楚楚舉賔興之盛典兮進賢書於天府羌天府之峗巍兮實萃國之焜煌列𢎞璧曁天球兮炯明月於夜光肆異才之挺生兮嫓瑚璉而圭璋旣温粹而罔玷兮又追琢其文章宜哲王之珍之兮登厥明而是藏嘻成后之善斷兮且睿聖而輔之日就月將而弗懈兮邁文武而緝熙建周官之六典兮植太平之丕基掌邦教於司徒兮鄉大夫以為屬宣德行而訓廸兮繄禮閑而樂梏俾藝苑之翺翔兮存秉彛之貞淑每三載而選遴兮書賢能於簡牘遂旅獻於丹扆兮覬重瞳於采録王再拜而受之兮忻得賢而善俗敇司寳之官而庋其書兮曾何翅於貝玉爰論定而授職兮聿錫爵而頒禄余㓜好此竒服兮佩徃聖之規箴夙清修而慎守兮亦廣討而幽㝷螢牕雪几矻矻以窮年兮非古訓為無所用其心維吾旣有此内美兮遂充貢於斯今皇穆穆以當天兮亶丕承於祖憲軼盛治於成周兮興羣才於海甸曰余蒙此嘉惠兮遭世孔仁蘄登名於天府兮攄尺寸之忠勤叩閶闔而開關兮呈琅玕於帝所跽敷衽以陳辭兮念明時之欣睹茲較藝於鄉闈兮聊抽思而作賦顧雕蟲之何有兮守中扃之貞固廼舞抃而為之歌曰成周至治八極咸寧兮碩彦閒生為國之楨兮司徒典教興賢能兮策書入獻天府是登兮猗歟我皇為治厲精兮設科取士羅羣英兮所寳惟賢錄姓名兮藐焉小子希對揚於明廷兮呉山賦天泬寥而清曠兮金風淅淅而蕭森駕言馳騖於西淛兮緤予馬於虎林寓遐矚於此邦兮爰陟呉山之高岑苔梯石磴縈九折之委蛇兮躡巉嵓而登臨躋㠑嵬之峻頂兮眺竒巘之嶔崟倚太虛而峭㧞兮崷崪崱屴不知其幾層根盤數千里而廣袤兮周廻紆鬱於坤垠層崕倚披而鵬翅兮叠峰崚嶒而虬鱗烟雲歕薄其萬狀兮日月蔽虧於夕晨草木暢茂而異香芬郁兮靈奇怳愴而升沉東望則海門之岝􅣉兮三島負鰲而贔屭天目𣺌以西至兮萬石飛來而錯峙左西湖之瀇瀁兮匯冰壺而清泚淛江右帶而混瀚兮驚湍漷潏而漰濞紛總總其上下兮艅艎舳艫相屬於千里下窺闤闠之衍迤兮樓觀巍峩而叠起衢道衡縱而如畵兮車馬駢闐於九軌異珍輻輳以咸萃兮委南金而象齒大府屹立於雄藩兮甍棟翬飛而麗美台星耿耿而旁燭兮闍婆流球會同而至止挹佳氣而拄笏兮偉翠屏之若倚繄是山之鍾秀兮肇𤣥黄之開闢顧名號之曷從始兮繇泰伯文身而建國闔閭揮戈而駕楚兮夫差奮矛而栖越何西施之嬋媛吾以為好兮賜屬鏤於婞直勾踐長驅而沼呉兮胥泛遺忠於潮汐銀屏雪屋衝突於山趾兮存英雄之遺跡叢祠屹於崇岡兮薦馨香於明德高風稜稜而與此終古兮鎮坤輿以無極歌曰大塊流形峙危阜兮句呉祚土錫分守兮伍員鯁直忠肝剖兮命祀千載怒潮吼兮聖人馭極一宇宙兮拳石海堧如培塿兮雄藩重鎮永遐乆兮蠻夷卉服拜稽手兮我皇撫運億萬夀兮抽思作頌貽不朽兮泮宮賦予㓜好此竒服兮希前哲而進修曰侯邦之有學兮慕泮宮而來遊何所獨無竒覽兮羌於此乎乆留煥奎壁之煌煌兮亶屬目而夷猶由義闥之軒朗兮造道閫之嚴邃瞻崔嵬之層構兮趍廣袤之敞序登倫堂之博大兮偉俊髦之是處聆弦誦之琅琅兮侈文物之燁煒歴重階而拾級兮陟聖域之穹崇叩大成之鉅殿兮闢綺疏之玲瓏拜素王之遺像兮儼龍巻之儀容想過化存神之妙兮更千百年而愈隆歩前除以徜徉兮暏泮池之澄碧降殺於辟廱之度兮象玉潢之泮璧蓄源泉而不竭兮涵天光之昭晰茂藻芹之芬郁兮春意生生而不息繄厥初之有作兮實肇造於蒼姫維東魯之建國兮闡文服之攸施於赫公旦之有孫兮纘十有九葉之丕基樂泮水而翺翔兮載龍旂之委蛇習大射而周旋兮憬彼獻琛之淮夷序鄉飲而獻酢兮儼穆穆之威儀多士漸摩而克廣於德兮紛總總而驅馳嘻魯叟之燕坐兮亦龜蒙曲阜之遺規顧嘉名之招揭兮盍考譜載籍而有證也奚毛鄭之異詞兮吾將孰從而取正也抑稽魯頌之訓故兮謂東西南瀦水而北繚以周垣故徵諸鑿沼之形狀兮探名號之本源若王制之推㝷兮求義理之斯存眷言政教之是頒兮溥德意之敷宣究六書於會意兮葢分判焉云爾班條章於此學兮俾民眎則而興起半天子之制兮明尊卑之殊軌雖立論之無同兮匪乖戾於本始蹇予未有知兮値昌運之文明八埏春育於元元兮侈黌舍於列城彼魯申之采茆兮又何足以揄揚於頌聲制禮樂以陶吾民兮固將軼成康之太平歌曰猗歟泮宮之廓開兮興羣彦而蟬聯抑抒意於鄙辭兮庶幾續周雅之遺編别知賦有序學正董君彦醇書滿謁選天官為歌此賦以餞之維紫陽之巍峨兮汎石壁之漣漪實遯翁之所家兮沛遺澤之沾滋芬茒芹之郁郁兮交玉佩之陸離駕吾乘於東淛兮懐檄書而來茲佐鳴鐸之清响兮振縫掖而委蛇升臯比以劇論兮拂殘編而剖疑抒緒餘於詞藻兮發幽興於歌詩偉繁露之璀璨兮繄先世之所貽縱横宇之摧壓兮撼震凌而弗支爰翼贊以修完兮倏炫燿乎前規嗟日月之冉冉兮考績及於𤓰時何揚舲之不可繫兮載雲旗於江之湄凌埃風而上征兮遄將造乎京師攄天人之素藴兮叩帝闕而陳詞朝騁騖於玉署兮夕翺翔於赤墀彼青紫之俛拾兮亦志願之攸宜念蓬踪之聚㪚兮曾幾何以追隨惟知心之難獲兮顧繾綣而抽思山巃嵸而萬叠兮水汨㶁而流澌酌瑶觴之醇酎兮調鴈柱之朱絲情惆悵而若失兮意縹緲而如馳凱嘉晤之有繼兮庶此歡之可期三友堂賦有序余友張文玉鄉先輩明善先生四世孫也伯仲三人刻苦自樹不墜先業構堂値松竹梅扁曰三友其兄介玉愛松弟仲玉愛竹皆以儒術就吏禄而文玉癖於詩以梅自娯訓導鄉校有年矣郡太守嘗辟為司會不就士輩咸異之暇日與登斯堂徵余為之賦承先祖之嘉惠宅雉堞之東隅構櫩楹之閒曠列軒檻之敞虛植松梅與茂竹象棣樓之鼎居儷清賞之朋從篤高誼之友于時三會而笑傲矧又樂夫潘輿繄厲操之不易歴歲晏而與俱彼美大夫蒼髯倒植走虬龍而偃葢披介鱗而櫛比身昻藏而逾秀節磥砢而多異撼半空之靈籟挺萬古之葱翠滴琥珀而下藏蔓蔦蘿而旁施聳冠劍之交横若大臣之廷議暫榱桷於琴堂茲繩墨之小試茍匠石之一顧作棟梁之偉器粤有魁仙澹然幽姿列崢嶸之高柯敷的皪之芳𬎼欺氷雪以逞媚粲珠玉之生輝禀造化之貞潔發英華之瓌奇占羣芳之上流遠桃李之栖遲備太極之至理表隠士之範儀月疎影而錯落風清臭而芳菲雖韜采乎邱園猶暎照於潢池待青子之有仁調鼎鼐於明峕懿哉此君猗猗叢碧心洞然而中虛幹翛然而外植卸斕斑之錦褐峙琅玕之緑㦸森意氣之嚴毅覆濃䕃而静寂來清飈之故人袪大暑而辟易姑備用於簡牘畫刀筆於篆刻行登進於玉堂俾編修於史策若乃風霜高潔隂谷嚴凝柔花萎薾茂草摧零嘅芳華之寞寞驚肅氣之稜稜唯三世之榮茂特强項而守貞禀後凋之健德歃末景之三盟宜高人之景行爰尚友而怡情於是萬寳告成三餘多暇折含黄之滿筐泛新緑之盈斝偉昆季之團欒胥燕坐乎堂下媚萱草而介夀祝喬松之純嘏春一枝兮班班日三竿兮洒洒締乆交於無射樂天倫之閒雅嗤市道之澆漓或朝逢而夕舍眎同氣如仇讐剖連枝於中野始强笑而追逐倐擠石而擲瓦暏清河之高風盍顔恧而靣赭乃從而歌曰蒼松鬱鬱交繁隂兮義竹叢生如相親兮中有横斜漏先春兮凌寒參立儼幽人兮志士取友惇天倫兮紅紫棼棼特微塵兮又歌曰高堂輪奐屹華搆兮雁序詵詵三益友兮歲晏怡愉驩永乆兮齊奏慈君介眉夀兮節誼堅貞世鮮有兮抽思作賦貽不朽兮九夏賦有序周官鐘師掌金奏凡樂事以鐘鼓奏九夏王夏肆夏昭夏納夏章夏齊夏族夏裓夏驁夏註曰金奏擊金以為奏樂之節金謂鐘及鎛先擊鐘次擊鼓以奏九夏夏大也樂之大歌有九杜子春云裓讀為陔王出入奏王夏尸出入奏肆夏牲出入奏昭夏四方賔來奏納夏臣有功奏章夏夫人祭奏齊夏族人侍奏族夏賔醉而出奏陔夏公出入奏驁夏禮外傳曰朝聘燕享之禮或受之於廟或延之於寢及祭祀在廟皆以樂納賔夫人助祭出入奏齊夏周公制禮而樂章大者有九謂之九夏笙師掌舂牘應雅以教裓樂註曰以此三器築地為之行節按鄭康成曰肆夏詩也叔孫穆子與文王鹿鳴俱稱三夏則九夏皆詩篇名頌之族類也左傳杜預註曰肆夏樂曲名周禮九夏其二肆夏一名繁其三昭夏一名遏其四納夏一名渠葢擊鐘而奏此三夏也魯語又曰肆夏繁遏渠呂叔玉曰肆夏繁遏渠皆周頌也肆夏時邁也繁遏執競也渠思文也其說互異要之九夏皆樂歌之名而不可考矣疏曰王出入令奏王夏尸出入令奏肆夏牲出入令奏昭夏皆大司樂文四方賔來奏納夏臣有功奏章夏夫人祭奏齊夏族人侍奏族夏四者無明文或子春别有所見云賔醉而出奏陔夏者賔醉將出恐其失禮故陔切之使不失禮鄉飲酒鄉射燕禮大射賔出之時皆云奏陔云公出入奏驁夏者大射云公入驁是諸侯射於西郊入時奏驁夏不見出時而言出者樂司行以王夏出入禮同則驁夏亦出入禮同故兼云出也此九夏王夏惟天子得奏諸侯以下不得肆夏則諸侯得奏故燕禮奏肆夏大夫以下不得故郊特牲云大夫奏肆夏由趙文子始其昭夏以下諸侯亦用之其驁夏天子大射入時無文故子春取大射公入驁以明天子亦用也愚按賈公彦云鐘中得奏九夏者謂堂上歌之堂下以鐘鼓應之故陳氏樂書云堂上堂下之樂兩者並用作方其工之升歌也搏拊而鐘磬作焉黄鐘之鐘鳴於堂上而堂下之編鐘應之黄鐘之磬鳴於堂上而堂下之編磬應之所以節歌者之句也先儒說書笙鏞以間則曰堂上詠歌則堂下之樂不作堂下奏樂則堂上之樂不作抑獨何耶今考舜典云歌永言聲依永律和聲八音克諧而左傳云歌鐘二律又云金奏肆夏則歌與鐘鼓並作疏言是矣乃為之賦曰厥初𤣥黄之肇判兮囿至和之絪緼大音隱於冲漠兮閴窅黙而無聞繄聖神之繼生兮泄堪輿之清淑聆玉鸞之啾啾兮契中聲於嶰竹姫后儼而袛敬兮躋八埏於時雍偉大武之有作兮神瞽聰而能調協兩間之冲豫兮紛玉琯於典同固睿哲之工巧兮道太和於王朝展九夏以為詩兮合登歌於金奏皇剡剡而進却兮曵袞衣之委蛇駕六龍之蜿蜿兮齊玉軑而並馳奏首章於王夏兮鳴笙鏞之參差靈氣冉其下征兮神洋洋乎左右孰好修而主之兮忽奔走於先後陳肆夏而浩歌兮竽瑟鏗其雜揉美騂犧之繭栗兮命櫝蓍為余占之曰薦是以明禋兮豈有神其舎之旣在滌之潔蠲兮昭夏奏而來思百神繽其並迎兮舞干翟之陸離集磬筦之鏘鏘兮輅簡狄之新釐四國率其來賔兮冠岌岌而偕至叩帝閽而開關兮贄玉帛而為贄工歌納夏以延之兮陳萬舞於其次無此疆而彼界兮懷秉彛之淵粹惟爾甥舅叔父兮敵所愾而獻功宣昭明於章夏兮鳴宮縣之編鐘列俘䤋而充廷兮羣舞抃而從容迨肆筵而燕樂兮錫秬鬯與彤弓魚軒招搖而戾止兮粲副褘之姣服亶佐助於王侯兮執豆籩於瑤席靈連蜷而旣留兮奠瑚璉於黍稷疏緩節於齊夏兮舞繽紛而繁餙宗支衍而蕃碩兮侍孫子之振振族夏歌而應律兮鏘瑤􅒶之鏗金嘉賔式宴而旣醉兮羌屢舞之僛僛陔夏以為行節兮鳴鐘鼓而送之降西階之踧踖兮聿折旋於矩規八音紛以節奏兮實王心之所怡猗嗟邦君之郊射兮駕言邁而云返詠驁夏而容與兮珠纍纍而若貫龡籥管而拊鼓兮颺翠旌之縵縵惟茲九頌之迭奏兮與至尊而俱作侯庸肆以暨驁兮亦康娯而愉樂思聖德之博大兮宣鬱閼於穹愕惜簡編之煨燼兮紛紀註之參錯何宇文之效矉兮高齊以授私隋堅登歌以皇夏兮法蒼籙而陳辭儗大明於螢爝兮測滄海於瓢蠡紀班班於殺青兮貽來今之笑嗤惟聖元之􅉼煦兮洽重熙於覆載播繩音於樂歌兮極雄偉而宏大軼姫周而過之兮翕五音之繁會抒菲言以作頌兮歌懿德於峕邁環谷集巻一
