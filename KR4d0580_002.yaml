body:
  text: 環谷集卷二元汪克寬撰辭贈遠辭餞陳尉趨燕繄洪都之巨藩兮翼軫之墟有媯氏之苗裔兮曰元龍之緒餘維祖鼻之殖學兮陳宏詞之藻麗偕東萊以掇科兮攄雄才於經濟逮夫君已五葉兮尚遺澤之流芳試刀筆於案牘兮贊謀略於油幢皇畀豫以仙吏兮授休寧之少府膴仕之涂繇階而升兮展青雲之步武羌布政之有方兮長草色於黃扉彼狗偷與鼠竊兮咸徙義而弗違縣有獄而莫詰兮伊大辟其誰任君發摘如神明兮囚具伏而不以訊慨豪右之怙勢兮侵奪乎男庠之土田君奉檄而按治兮復疆理於陌阡使軺歲巡而經於茲兮叨奬借之殊遇上薦章於清臺兮謂亷能之顯著書上考而及代兮聿遨遊於上京遄升華而立要兮搏九萬之鵾鵬吾儕小人兮徼帡幪於下邑念惠愛之不可忘兮顧扳留而靡及揭祖帳於東門兮寫山水乎烟雲抽繾綣之離思兮聊抒意於斯文松蘿老人辭休陽耆老美大尹唐公之賦均役也松蘿之山兮巘崿廞􅂒浙源之水兮清且淪漪氓居其間兮密室參差繄墾而耕兮亦耘以耔井井南畝兮鱗鱗東菑歷歲滋久兮棼貿易於質劑或有餘如蚿兮或不足如䕫視版圖之舊額兮相什百而倍蓰胡司存之未察兮循苟簡而弗治巨室安閒兮細民恆屢困而流離公質肅之苗裔兮偉時彥之表儀冰霜其操兮鸞鵠其姿承后皇之嘉惠兮履雙鳬而下來能蒞政以寬兮撫民以慈慨民役之弗均兮厥咎何居曰吾為邑長於斯兮責將奚辭揭良法於墻壁兮示秩秩之𢎞規舉鄉里之良民兮觴於庭而告之稽定業而書於籍兮必核實於毫釐毋慢而疏兮毋詭而欺往盡而心兮勿煩有司越期月而告成兮曾弗施於箠笞其繼自今兮辨等差之崇卑歲有繇賦兮佚勞適宜吾儕小人兮欣幸會於此時强振衣而起舞兮睹美政之恬熙聿扶杖於公門兮一再拜於前墀念民瘼之有瘳兮匪公而誰願公顯榮兮秉衡軸之樞機駕騏騮之逸足兮騁九軌而並馳集山谷之謳歌兮聊抒意於俚詞將紀績於堅珉兮泄吾心之遐思和陶靖節歸去來辭有序余幼年讀靖節先生此辭嘆其志節高潔棄爵祿如土芥蓋其耻事劉氏非止遺榮而已也撫卷三復敬慕不已遂倚韻和之而鄙意微有異於先生比閲舊稿如房次律睹故物於破瓮中頗愧少作疵纇顧不忍棄去姑存之歸去來兮茅塞蹊間胡不歸繄正性之遷移蕩流往而堪悲聚蟻蚋以慕羶放雞犬而莫追昧庶理而蒼素荃非是而是非顧藴中之弗類徒巍冠而袞衣棼念慮於方寸曾勿辨於幾微蠅營狗茍鵲疆鶉奔違乎義路闔其禮門至道純粹匪我思存以彼瓮盎易我彛尊歸去來兮南炎火之赫奕北寒山之孱顔西弱水而東海夥害物而遑安蜮含沙而射人虎磨牙而守關嗟昏迷而罔覺喟長嘆於旁觀盍猛省而思反覓故居而復還聞異香於聚窟立老鶴於門桓於戲噫嘻哲入熙熙與造物而同遊保后皇之降衷初奚取而奚求養浩氣而弗栗循恆徑而靡憂秩五典於虞册建九法於箕疇若拭古鑒若泛虛舟澄汚濁於清源守常明於丹邱宰萬彚而昭焯思八表而摎流物總總而交前羌逸豫而日休已矣乎居乎安宅恆若時孰謂神往而形留胡為乎倀倀肆所之支流宗渤澥康莊會崇期皎靈府兮孔𢎞治情田而常耔諟明命於伊訓執恪恭於商詩偉天君之泰然曷受諫於前疑又和陶淵明歸去來辭别曹仲傑昆玉歸去來兮天寒雲邊征鴈歸南飛呌月聲嘹唳使羈旅絆而傷悲逢斯世之堪嘆思往事之莫追感江山其有易覩風景而是非霜凛凛以切肌風獵獵而吹衣玩山前之紅樹望雲外之翠微羈思有感得興若奔憶君邀迎留余聖門經書玩味道誼長存飽我以德酌我以樽同清吟以適意共雅論而歡顔依梅林之茂䕃守歲寒而相安雖客窗之云樂偶故里之情關憶青氊之復舊對黃卷而常觀喜朝益而暮習愧春至而冬還慕唐堯兮虞舜鑒晉文兮齊桓歸去來兮訪竹徑以遨遊知榮辱之可畏遠名利而匪求對樹花以遣興傾竹葉以忘憂樂夫經訓乃菑畬假筆耕乎田疇或執樵斤或棹漁舟然托迹於朱呂每留意乎軻邱好躡屐於崇山宜濯纓於清流輕浮名於一羽貴安分乎四休已矣乎曾聞俊傑能識時張良范蠡去與留胡為乎西去復東之松楸望豫省枌榆亦我期慕陶令之行藏踵龎公而耘耔傍東籬以待酒遊西園而賦詩何當剪韭春風裏與君相約勿相疑惜别辭公胡為乎山之幽靈草叢生兮久淹留松蘿崚嶒兮於焉遨遊笑言恬嬉兮五越星周公之來兮草木春七郡煦燠兮涵至仁茗臺肅清兮閴無塵詼詭譎怪兮屏迹而濳身公之去兮秋風高鯤鵬變化兮萬里翺閶闔開兮瓊宮嵯峨翼贊元化兮躋堪輿於太和秋山兮重重秋水兮汪浵扳援欲駐兮不得以從容矯首而思兮憂心忡忡哭任生本初哀辭有序吾友任本初蕭齊御史中丞敬子之裔孫也諸父昆仲往往以賢才得官師至正癸未其父始命之從余講學授春秋左傳胡氏傳輒通大義學古近體詩句法圓熟興趣清遠臨歐陽率更帖尤得其筆意屢訪余環谷山中相從於宣之太平無時相舍余編著春秋纂疏本初與有功比年矛㦸搶攘本初紏集義兵扞衛州里遂被擒焉壬寅之春余寓黃山之麓忽聞其抱疾殁於外舅之居年方三十有五嗚呼痛哉本初為人事親以孝友愛於弟交友以義尤施恩於鄉黨汲汲濟人之難如其父之用心也從余遊者如本初甚鮮余嘗為文銘其父之墓去年九月哭其叔父今又哭本初若之何不哀且慟也故為些辭以哀之余取友於天下兮歷名邦而轍環雖朋從之彌衆兮胡逹才之良艱得任子於海寧兮實頴異而可愛曷秀而不實兮使豫悲慟而心痗余哀任子之不夀而殁也爰命巫陽招而復之巫陽拜手亟招以辭辭曰任子神遊胡不歸來些天地茫茫子奚之些魂乎來歸爾父勤勞保宗祐些扶顛植仆君子澤些金籝篤教遺戒昭焯些魂乎來歸繼承乃志唯子是託些魂乎來歸爾母鞠育恩孔深些思子望望髮不盈簪些魂乎來歸不可久哀以損其心些魂乎來歸難兄難弟如足如手些爾弟孑立孰與左右些魂乎來歸思兄之悲不可以久些魂乎來歸爾子三齡泣呱呱些骨秀神清識之無些騏驥之駒丹鳯雛些魂乎來歸毋使寧馨幼孤些魂乎來歸疇昔相從不違頃刻些祁川汪浵黃山嗟峨屢涉歷些晨窗夕燈幾請益些問難勤劬不可復得些魂乎來歸客歲城府往來追隨些少陵一編精研細玩悃悃論詩些孰知永訣我心哀悲些魂乎來歸蠲我憂思些魂乎來歸兩溪之湄喬木薈鬱些秋風蕭颼白雲出些魂乎來歸世故紛繁憂患誰恤些魂乎來歸大塊無垠一蘧蘆些日月流邁運大虛些本性湛然明有餘些魂乎來歸返故居些辭曰富川滔滔兮不舍晨曛岸芷郁郁兮江蘭有芬魂不可招兮涕泗沾余巾巫陽載歌兮籲於蒼旻哀些五章為鄒山處士作鄒山兮幽幽古木連蜷兮枝相樛白石礧磈兮飛泉駛流粵有人兮於焉藏修駕言逝兮溘涘風而神遊皓鶴悲鳴兮青狖啾啾室廬空閴兮荒故邱胡不歸來兮少淹留陵谷變遷兮陸海波濤鯨呿鰲擲兮百怪喧囂生不逄辰兮繄時之遭嶮巇萬變兮身為勞林林總總兮癢不及搔恬然處之兮九牛毛一朝幻化兮遺蓬蒿胡不歸來兮山中遊遨噫嘻世之人兮萬纍紏纒紅塵馳騖兮狂而顛獨不忍為此態兮守清白而靜專被服紈素兮却美饌之腥膻登山匪車兮涉江匪船羌有餘而不足兮恆嘆息於䕫蚿恍惚大夢兮路邈綿胡不歸來兮聽潺湲大化無垠兮猶埏埴之陶鈞跖何命之長兮顔何命之屯嗟哉斯人兮朴以醇夫何灾疢兮四體不仁越星周而弗瘳兮重子姓之悲辛丹青倣佛兮逌然笑嚬五十八載兮無懷民胡不歸兮潔吾真秋風蕭瑟兮揚丹旌薤露滴瀝兮天杳𡨕羞桃茢兮采芝英奠桂醑兮酌彼兕觥幽坎何許兮鬱鬱佳城長夜不曙兮不如無生眷言送之兮涕淚零胡不歸來兮紓此哀情詩賜致仕官恩幣詩有序至正四年皇上肅宗禋祀霈澤遐邇賜致政官恩帛各二二月五日休寧令奉天子命致表裏於判府復心汪公令尹中正洪公以耀嘉賜婺源胡公石賦古詩一章以頌休美祁門汪仲裕和而歌之於赫聖皇治化𢎞敷釐事告成寵嘉爾殊興孝是崇綸章燁煒畀爾元老綺衣黃裏維昔元老共職實勤政事於今至忠允存皇旌其忠庸侈厥賜恩命是荷繄忠之自巍巍逹尊序孰與先印纍綬若子姓綿綿皇賜大綏我眉夀謂昔哲王允敬耆舊耆舊再拜天子萬年勛華夀考異世齊肩維水有源維木有本耿耿丹心聿瞻黼袞矢詩不多以頌休明俾貽遐久永彰德馨戊寅十二月十九值先君誕日不勝思慕瀝哀賦古意二首白髮八十餘采衣日為娛耕田奉菽水朝夕問何如云何雪霜憯喬木俄摧枯慟哭心膂裂殞絶欲與俱聲如九泉聞淚如九河傾死也不復知生當若為情朔風落木盡雲寒天地昏趨庭閴寥寂謦咳不可聞去年為親夀殷勤奉金樽焉知日入速倐忽川流奔遺書篋笥中手澤新如存蒲伏拜几前淚血池水渾庚辰上元日念母有感而作餘生積罪戾酷罰洊來臻諼草華茂滋霜露遺酸辛憶昔此日夕雙親坐高堂炯炯列燈燭兒女羅酒漿今年拜遺像燈燭黯無光隂風動縞幃慟哭涕淚滂清明思先壠芳樹曉烟鶗鴂鳴淡雲暈碧漏新晴驚心時序百六日回首家山十五程病思為魔成逆旅夢魂飛淚灑先塋遙知兄弟溶溪上細掃松花酹麯生和唐宰山行二首山縣千峯叠閭閻雜嶮夷雨香魚撥剌風軟燕差池郭外耕夫耦桑中稚子嬉絃歌聲教遠民俗變澆漓樂石鐫嘉績𢎞林邁等夷春深潘嶽縣墨漬右軍池詞藻天然妙章縫日與嬉鳴騶經里巷問俗察醇漓丁亥四月陪宗叔澤民先生遊翠微寺分得微字駕言招提遊石磴凌春扉層構屹寥廓叠巘周屏幃舉頭見前峰峍兀峨翠微石罅檻泉涌相傳錫杖飛宗卿昔留題詞華妙天機八載此重來巖壑生光輝相羊縱遐覽暫喜塵事稀瀟灑山水意於焉淡忘歸丁亥四月十四日陪尚書公澤民遊祥符寺分得暖字芙蓉六六森如鏟乘輿登臨寄疏散緑沈靈湫老龍蟄翠護祗園新竹短山樂鳴空石洞寒金雞䑛鼎丹爐暖蘚瘢拂拭讀殘碑一浴靈泉容塵浣題道士張湛然彈琴詩卷嶧山白桐千年枝金星爛爛蛇蚹皮文光七軫藍田玉氷絃細繞吳蠶絲丹山雲暖鳯凰語露草寒蛩訴秋雨娥英泣灑湘筠斑遷客相逢話羈旅翠巖懸瀑鏘瓊瑤雷霆霹靂轟層霄瞥波細萍游蕩漾劈空輕絮飛飄颻仙林唳鶴驚離别老龍湫底吟寒月海門送上子胥潮澎湃奔騰捲殘雪羽人瀟灑顔如仙憑虛來往黃山巔古音淨洗箏琶耳何須更濯丹砂泉題李營邱畫驪山老姥賜李密火星劔圖蒲山鋭額千牛客蒲韉跨犢行無跡挂角青編一束書夢對重瞳意相得昆吾寶劔三尺水火星炯炯精光起花冠仙姥授神竒拜起倉皇驚更喜鞏南歃血盟玉盤龍舟錦纜誅疵瘢折簡唐公結昆弟威稜六月嚴霜寒豈知不學萬人敵雄才空覺乾坤窄九卿裂地藏雕弓稠桑土蝕銅花碧岧嶤古樹蒼玉林丹崖慘淡霾輕隂龍津倐忽風雲化未須感慨荆軻心秋後雨楚東五月天無雲日光流金百草焚南風吹山彭蠡涸稻畦坼坼占龜文木郎無神龍不起牲牢熏燎徒紛紜梧桐一葉炎官老雷車轆轆天瓢倒陂池泛溢失高低萬穟青黃發枯槁白髮田翁半憂喜卻憐久雨禾生耳磨鐮欲穫泥濺胸纍日隂霾黑千里何時木德守三星五風十雨歌升平環谷集卷二
