body:
  text: 環谷集卷七元汪克寬撰銘大學正心四戒銘戒喜銘君子之學孳孳不息欲盡理融中心悅懌世俗之喜玩物適情娛於嗜好鴆毒心酲小子戒之非喜勿喜窒欲間邪樂善而已戒怒銘聖賢之學鋤姦撥亂去彼凶頑拯兹塗炭世人妄怒焦火斯炎面赭髮竪蹈禍而顛小子戒之必懲其忿中心湛然不知不愠戒憂銘宣聖上達樂以忘憂禹稷憂民橇􅞬鉏耰與憂俱生世俗所溺患得患失逐利惟劇小子戒之講學徙義憂之如舜志軻之志戒懼銘聖賢之心至理熙熙浩氣配道砥柱弗移世人徇欲內省多愧其氣欿然惟恐惟怖小子戒之懼所不聞自反而縮勇奪三軍思復齋銘厥初生民萬本則一降衷秉彞至理真實桎梏物誘邪慝雜之本然之善未始或虧身之反之斯為上智中人以下毋自暴棄吾儕小子辨理劬書苦思力踐蘄復厥初雞犬易求牛羊勿牧存養省察戒懼慎獨不顯亦臨戰戰兢兢積之又久雲卷波澄一旦超然德崇業茂匪豐於今匪嗇於舊弗得弗措示敬坐隅日夕乾乾允念聖謨主靜銘人生而靜天之本性操而存之守之有定是心未發中扃寂然皎皎明鏡澄澄深淵遇物而感或喜或怒隨物處之於我何與不為事遷不為欲縱當然而然以靜制動統御萬變酬酢萬端中流砥柱任彼狂瀾我銘坐隅視以為則希聖之功蘄立人極存誠銘無為之真凝而為人滿腔實理具於吾身思慮未萌此心無妄至理渾然秋空月朗心與物接實理應之從違喜愠適事之宜燕坐間居景慕賢聖涵養天性至公至正遇事臨變隨時處中交人以信謀人以忠心無妄念志無妄想語無誑諂行無邪枉事上待下足履手擎毫釐必實頃刻用情百行之源五常之本自粗及精由邇逮逺斯須匪實言動俱虛物欲陷溺不保其軀我作斯銘庶幾允蹈願言思誠先民是效吳季實字銘惟人有生理全賦豫凝真無極精萃二五淵實中存四德渾淳英華外著萬善彌綸哲人希天文思允塞默契至誠庸熙庶績光輝充實體立用行洋洋發育振采抒英胡今之士習尚雕巧罔究本根秪令浮藻夸毗組繪鳯咮鷙翰潢潦易盈艷葩先殘華而靡實全體斯泯實而靡華大用斯隱卓爾吳生令資粹質稟氣精英持心篤實芳齡嗜學思猶厥宗勤劬請益憤悱求通黽勉進修孜孜不已騰實蜚英指顧千里慎終如始永保嘉名吾言匪鄙戰戰兢兢香逺閣銘有序友生汪文昭久從余遊而有得焉歸築書室於所居之東面臨方池植蓮輒茂並池作小閣以觀宗叔巢深先生摘周茂叔愛蓮説扁其閣曰香逺余銘之植物之華繄蓮獨清嫓美君子錫之嘉名外直中通令姿靜儼景風南來厥香斯逺同宗有子篤學在兹法則濂溪跂其齊而我作銘詩刻諸座右願言勉旃以延遐久亦政堂銘有序亦政堂者同郡鮑以仁築以奉其親者也以仁孝親友弟理家有法蓋受學於先友侍制鄭公而有得焉者公嘗摘魯語以名其堂而記之矣請言於余余曰傳云政者正也上所以正不正而下所以取正者也然書稱君陳克施有政謂其有孝友之心施於一國之政也吾夫子言施於有政是謂以孝友之心施於一家之政也故曰是亦為政亦之為言謂治家治國同是道耳蓋窮則為一家之政達則為一國與天下之政子曽子傳大學於治國平天下二章俱以孝弟言之有以也夫果能致盡已推已之心即在已者孝而人皆知孝在已者友弟而人皆知友弟施諸四海凖諸一家夫豈難哉既以語以仁乃撮其義而銘之政以正事綱紀經綸帥正以正斯濟斯民潔矩之道篤近業逺為政以德修身為本天之生物立愛惟親由是而推施及於人各親其親各長其長天下治平如運諸掌華勛孝弟斯道之原宣聖設教孝友彌敦自家刑國以建人極君陳之篇斯為凖則鮑子克孝木培其根怡愈奉親睦於弟昆翼翼髙堂爰居爰處聿顔其楣允念魯語篤於所厚表端影隨窮養達施舉而措之自治治人止於至善惟曰孜孜令德顯顯入道有門積學有基孰謂岱髙跂而齊而願言勉旃毋懈毋替永保令名貽諸來裔櫟軒銘有序友人鄭君士坦築藏修之室字之曰櫟軒徴余言以自勵余語之曰莊周氏見社櫟其大蔽牛匠石過之而不取謂櫟以不材得終其天年然櫟非果不材淮南記以為十二月之木十一月棗取其赤心十二月櫟可為車轂而説周禮者則謂櫟實象斗可共染今日之用若是則櫟果不材乎乃為之銘曰牛山之木斧斤相尋萌蘗其間牛羊遞侵鬱彼社櫟多厯年所煦以春陽滋之雨露本固葉茂厚積深培勢干雲漢隂庇莓苔巨幹百圍美實千億路車之轂染人之色漆園寓言覬全其天明時之用拙匠所捐吾儕殖學務其大者存兹良姿愛諸拱把鄭君作軒姑示匪材髙標挺特逸興崔嵬勿剪勿拜善芽滋長匪依穹林遐邇攸仰弗貪榆錢弗羡松官赤心為友以待嵗寒我作銘詩大書深刻願言朂之聿崇令德跋汪文節公簡帖後跋宗叔禮部尚書巢深先生其生也長克寬三十有一年延佑戊戌登進士第龎才碩德雄文異政聞於至順至正之間元統甲戌克寬以同宗從子拜先生於城府右簡十帖乃先生與吾友吳季實交晚嵗往復之尺牘也先生之先自五世祖以上實居婺源塋城在焉嵗時展省過城府屢留季實家酬答書問蓋多中更時變散佚而僅存一齋二大字乃季實先府君藏修之室之所扁也其第一帖云奔走南北蓋先生繇春官卿致為臣而歸之時也第二帖云黃山抵舍則至正丁亥克寬館寓黃山侍先生同遊三十六峯者也所謂小孫留外家則先生仲子用和彥禮之長嗣德崇世賢久從克寬問學以乙榜授德清文學者也第三帖至第八帖皆季實教諭寧國時問勞酬酢寧川黌舍頺敝季實創而新之部使者索公元岱嘉其勞績歸語先生為文記諸石先生奬勵深至且以精學業纂先緒朂之所以成人之美者厚矣所謂公文乃故里豪右侵先生祖塋而言於有司者也三賢之文則先生拜集賢學士時請以漢董仲舒宋范仲淹元劉因從祀孔子廟庭者也羅文卿七世同居有張公藝之風世攸鮮見朝省所當旌異者也祗此三事猶見先生嫉惡屏邪好善尚義之心第九帖云桑梓松楸感念弗置恆拳拳於思本第十帖云睹疲癃困匱莫之致力惟切湮鬱尤汲汲於斯民發第一第二帖時先生年已七十有五而第十帖在癸已甲午之間字畫遒徑精采煥發老成典刑鄉里情誼粲然辭意之表明年八月先生罵賊被害大抵秉心正直終始如一皓首致身臨難不屈大節焜煌照曜史册大常議諡易名以文節夫何愧焉季實服膺針規耆艾彌篤韜晦免患飭行全名果無負於先生之所期望矣今兹敬慕感泣裝潢遺墨貽諸後葉蓋非視為竒玩而已也以書求題卷左克寬老甚病甚永懷嘆息再拜而謹書之嵗舍降婁之次臯月既望之五日書張介玉手抄孟子後跋城府張君介玉年將七帙好學不懈手抄孟子書二帙以教其孫於以見君聰明過人尤且愛孫勤至而蘄書薌之有續也上章困敦之嵗余館授師堂携以示余余因正其句讀考其缺誤而歸之他日孫傳之子子傳之孫讀是書而殖學有成庶以知賢祖義方之志抑以知余友善之誼也是嵗旦月下浣同郡汪仲裕書贊提舉貫公像贊髯虬而體充骨梗而質淳赤虹萬丈為之氣清冰萬壑為之神標致如姑射之仙瀟灑而無塵襟度如雲夢之澤𢎞廓而無垠謙和之容曖然如春激勵之論鏗然如金世家文學居然得輪扁之真官途政理騞然中庖丁之音其憂國之志愛民之心蓋將磅礴萬物以為世運轉四海而為霖也歟靜樂公圖贊有序𣙜使貫公以靜樂字其燕居之庭邦人髣佛氣象祖帳長亭上某與公相知惟深故拏筆而贊之大塊勞生滚滚熙熙自役厥身蟲飛馬馳彼美君子靜中有樂志趣安間襟懷恢廓熏香默坐恬淡無為俯仰乾坤至理在兹展玩遺編歡然怡懌遐想聖賢熹意何極茗臺總政事簡民寧篆文生緑纎塵不驚潑潑天機和氣洋溢心逸日休五載如一匪伊大任贊化皇朝海宇以謐鼎鼐斯調刻畫如圖是用逸逺無涯去思寄此繾綣青山巃嵸嘉樹蔥蘢矯首千里悠然飛鴻汪府判像贊公之學溯濂洛之源而遊洙泗之濵公之詩參黃陳之妙而逼李杜之真貪泉賄市不足移其操印纍綬若不足縻其身氣象峍兀而不可攀者如絶壁之與孤岑儀容矍鑠而不知其耄者如翠柏之與蒼筠彼丹青者固能寫公之神不能寫公之心管幼安陶元亮白樂天繄公之倫歟啓答劉叔簡啓慕墨莊之萬卷逺在七閩得開府之一書賢踰十部宛如晤對劇慰傾翹恭惟執事胄接敞攽襟儲渠祿書林隱豹四方講鏤梓之新編藝苑雕蟲諸子肄掇科之逺業蝌蚪祕幽之鬱積魯魚讐校之精研侈矣珍藏久焉敬羡某叨趨鯉對粗習麟經慨傳文充棟之浩繁放疏義擷英而纂録萬八千言之筆削尋類例之始終數十百家之同異托事辭之精要聊備紺珠之記敢云繡木之傳詎意徹聞遽貽鐫喻丹鉛而求至當念點竄之未完琬琰以禆將來顧讓嘲之為懼願安承教用底成功守約信於末緘有如皎日寄抄謄之善本期以明年申復稽臯寅祈骩鑒不宣疏募建萬安橋亭疏伏以萬安橋左屋以為庵右屋以為亭有憩息馮觀之勝四方人北轅而之燕南轅而之越乃往來交會之衝雖云結方便之良緣尚乃欠完成於善事碧瓦朱甍覆乎其上者埀成而未竟青蚨白粲逋於其前者久假而不歸矧薰香燃燈者無所於居而吸露飲風者曷焉給食欲廣基築室并求香積之厨更鑿井建亭俾濟梅林之渴須仗十方之樂助庶幾衆美之俱完繞宅之禾百囷充棟之錢萬緡或寡助或多助負郭之雨一犁並橋之月半畝請大書請特書各生不吝之歡心共結非常之善果自今負者歌行者詠人人誇無量之隂功俾爾夀而康熾而昌世世獲方來之戩榖環谷集卷七
