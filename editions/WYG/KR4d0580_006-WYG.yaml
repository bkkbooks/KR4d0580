body:
  text: 環谷集巻六元汪克寛撰説易之文言傳謂君子行四徳乾元亨利貞説乾者徤也天之徳也天以至徤故能運四徳於四時君子以至徤故能體四徳於一身聖人以至徤故能行四徳於兩儀之間以參天地而贊化育元者物之始於時為春其在人則為仁其發則惻隐之情而得天地生物之心以為心者也月令天子賞公卿大夫於朝命相布徳和令行慶惠及兆民是體乾之元亨者物之通於時為夏其在人則為禮其發則辭讓之情而所以品節乎親親仁民愛物之差等者也月令天子賞封諸侯慶賜遂行無不欣悦命太尉贊傑俊遂賢良行爵出祿必當其位是體乾之亨利者物之遂於時為秋其在人則為義其發則羞惡之情而所以斷制事物各得其宜者也月令天子命將帥選士厲兵以征不義諸侯暴慢以明好惡命有司修法制戮有罪嚴斷刑是體乾之利貞者物之成於時為冬其在人則為智其發則是非之情而所以分别事理以宰萬物者也月令天子察阿黨使罪無有掩蔽功有不當必行其罪以窮其情固封疆備邉境命將講武飭死事是體乾之貞存誠堂説醫之為言意也意茍至誠則病之淺深加减證之隂陽表裏脉之浮洪㣲沉弦𦂳緩濇榮衛之盛若衰根本之堅固若虚憊調攝之或過或不及吾心之虚明以照之如睹龍鏡如飲上池水了然不失秋毫於是酌劑餌之温凉審鍼砭之補㵼厥効竒妙如有神助其不誠者反是傳有之曰至誠如神其弗信矣夫雖然誠者兩間之實理斯人禀兩間之氣以生鈞賦是理而能存之者盖尠業醫而存誠者尤加尠焉同邑徐宗吉自其上世攻岐黄之學及其大父仁齋翁益精其藝馳聲州里間宗吉克紹祖父業闢堂蓄善藥以捄人而持心信實曰丸曰散製和不慊於心不以與人也扁其額曰存誠而徴説於余余喟然曰存誠以眎證盡誠以用藥其有不中者幾希吾知宗吉推是心以追踪祖若父青於藍鹹於鹽不難也廼書是説以貽之經禮附説周禮一書果為周公所作乎漢武嘗謂周禮為凟亂不驗之書何休又云六國隂謀之書歐文忠公謂周禮可疑者二蘇頴濵謂周禮不可信者三是皆論以為非周公之遺制也然則周禮果非周公所作乎朱子葢嘗以周家法度廣大精宻言之嘗以周公建太平之基本稱之又嘗以周公從廣大心中流出稱之張横渠謂周公治周莫詳於周禮賈公彦序周禮廢興又謂鄭𤣥徧覽羣經知周禮者乃周公致太平之迹是則又明為周公所作也攷之西漢志於周官未之見東漢儒林傳乃謂周官經六篇本孔安國所獻隋經籍志乃云漢時有李氏得周官上於河間獻王獨缺冬官一篇獻王購以千金不得遂以考工記補成六篇奏之孝武時葢有其書特未與五經例置博士耳至西漢劉歆始置博士遂盛行於世後世因有周禮作於劉歆之説是則周禮作於周公而非他人之制明矣然冬官何為而缺也經罹秦燄散佚之餘與漢儒編錄附麗之誤而始謂之缺也何以知其然愚因考補散逸得之夫五官所掌曰治曰敎曰禮曰政曰刑而冬官則掌邦士或坐而論道謂之王公或作而行之謂之士大夫或審曲面勢以飭五材以辨民器謂之百工通四方之珍異以資之謂之商旅飭力以長地財謂之農夫治絲麻以成之謂之婦功此冬官之大較也見考工記所載者其屬二十有九皆工之事而士與商農之職俱缺焉考之春官之中如世婦内宗外宗皆宫中之職本屬天官而乃入之春官夏官之中如司士諸子皆掌士之職本屬冬官而乃入之夏官地官之中如司市質人㕓人賈師司􅕝司稽胥師肆長泉府此皆主於商土均草人稻人塲人司稼等職此皆主於農皆本屬冬官因其職與大司徒掌土地人民者相類乃以入之地官若是者謂非編錄附麗之誤不可也况小宰記六官六屬各六十攷之天官自大宰以下六十二地官大司徒以下七十九春官大宗伯以下七十一夏官大司馬以下六十九秋官大司㓂以下六十五何以冬官獨缺而為數不及五官皆盈而餘數過之理無是也他如儀禮有嗇夫之官國語有司商之官皆不載諸周禮此亦冬官之脱簡也要之見載於考工記者固為冬官之屬然司空掌邦土居四民時地利職不止此當自大司空小司空而下摭夏官之中掌士者地官之中掌商農者與夫嗇夫司商之數并今考工記所載之工總屬冬官則不惟合於周官司空之所職與小宰六官六屬之目而且周公制作之盛燦然溢著於編使人得以觀其㑹通而為太平典禮之全書也克寛因并錄巻末以俟博古君子正焉任生名字説休寧任生序再拜言曰序受學於先生於今五年矣願先生字之且述其義以敎序期佩服不㤀而因以勉於學也余曰冠而字古也今冠禮雖廢待生之年既弱冠而字之未晚也生又拜而請曰序懼不獲常侍先生左右茍命之字若先生之言恒在乎耳而注乎心也余以其請彌篤乃字之曰本立而告之曰序與叙同天倫之次第也天倫有五曰父子曰君臣曰夫婦曰長㓜曰朋友盖天下之大經也人道之大於是焉係舍是則無以為人也果能如此實有所立事親以孝而仁之理由是而推焉事長以弟而禮之理由是而達焉以至於君臣之義則事上撫下亦其則也夫婦之别則應事接物莫不有智也若夫朋友之信則凡所以發於中而應乎外者皆不可不實也於是五者各盡其當然之則則大本立矣聖賢之學焉有他術哉經籍訓此者也文詞論此者也徳業事功踐乎此而表著者也生盍廣讀精思克勤克謹而於日用彞倫之間先立乎其大者則其進未易量也生其可不朂之哉既以敎生且書其説以貽之蔣之翰字説同邑蔣周翰維楨從鄉老先生遊而青於藍矣至正辛夘年既弱冠因舘授余從孫仲寧之居而過余辨疑問惑求所未及焉既又請叙其字若名之義而申勉之余告之曰釋詁之文曰楨翰幹也釋之者引詩維周之翰以證之夫楨幹皆築墻之木也墻端之木曰楨墻之兩旁障土者曰幹詩人引物連類以賢才為國家之楨幹葢垣墉之築匪楨若幹則捄之陾陾度之薨薨築之登登何所依附國家匪賢才以任衆職則禮樂典則法制禁令是孰主張是孰維持是孰辨而孰設施之哉子以維楨自名而以周翰字子盍思研窮至理表裏精粗期無不至有所未至則訪鄉先輩耆俊而講切焉夫然後身履力踐百倍其功弗篤弗措必求造古人之域則他日出應時須為國家之楨幹也必矣子之始祖周文公為周家立八百年基作大雅之詩追述文祖之徳以詔後世而謂多士皆國家之楨幹厥後尹吉甫又作崧髙之詩以美申伯甫侯之賢能為周室之楨幹為國家者頼賢才以立國如此夫子之先世公琰相蜀漢大直相唐勛名事業照耀簡冊子尚篤志於學弗懈益勤則不惟無愧於名若字抑亦有光於前人矣子朂之吴氏三子字説友人吴仲實甫年且耆艾見三子長次皆就外傅而受學矣請余字之以叙其義而告之余曰冠而字則祝之以辭禮也今尚㓜盍俟其稍長而命之字可乎仲實答曰生非欲使之尊其名以夸於人也實欲使之敬其名與字而亟責以成人之道俾昭然知所以示訓而永久不㤀也余曰嘻仲實之愛子不以姑息而覬其速成余焉得不取夫文之美者以為之字而警戒以造就之乎乃召其子來前而語之長者益字之以文遷葢取易之大象風雷益君子以見善則遷之義也次曰革字之以文炳葢取革之九五象傳其文炳之義也又次曰兑字之以文悦葢取彖傳兑説之義也既以語復祝之以辭曰益也勉旃宜朂爾躬聞義而徙惟善之從風動雷行勿固勿慵日進髙明厥徳乃崇又祝曰革也勉旃學貴克變剛徤中正慎思力踐必强必明勿替勿倦徳容昭著允儕時彦又祝曰兑也勉旃講習為宜朋友切磋麗澤於兹孜孜不懈心中自怡底於成功前哲可希祝已遂書以貽之尚願其受兹辭而藏之深求其意而勵其所未能充其所未至則有所立而克纘先祖之緒矣吴氏之子孫其福祿詎可量乎三子其懋敬哉環谷集巻六
