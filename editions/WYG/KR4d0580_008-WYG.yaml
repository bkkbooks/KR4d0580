body:
  text: 環谷集巻八元汪克寛撰碑黟縣横岡忠烈廟碑古者有徳必百世祀之有功於民恒有祭法矧禦災捍患能福其民者乎忠烈汪王當隋之亂以布衣倡義募集驍勇捍禦一方暨唐髙祖削平區宇遣使送欵朝廷嘉之授以方牧封越國是時四方鼎沸羣雄蠭起據數州之土竊名字者不可勝紀争地争城晝夜戰鬭斬刈蒼生若薙草菅然惟王保有六州奉隋正朔以待真主俾其境土之民遇鋒鏑如處承平之世邦人思其義往往立廟祀之不㤀水旱疾癘有禱輙應葢七百年於此矣自宋迨皇朝中賜王爵徽號八字榮錫載續恩秩寖隆葢王之功徳在民者無窮故民報之亦遐久而不怠也黟縣横岡故有廟嵗久隤圮至正四年甲申春二月里人程儀鳯兄弟捐貲改作秋七月落成堂寢門廡為盈一十六楹棟宇宏麗丹漆輝霍肖象尊嚴軒牖疎達復構四楹於廟之西偏命祝史某居之以職焚修之役儀鳯割田十畝俾某世食其利而繕葺其廟宇焉十年庚寅夏四月儀鳯請余文而勒諸麗牲之碑廼叙其嵗月而系以迎享送神之詩厥田疆畝列之碑隂詩曰桃源之山兮黟之水民思神徳兮百世無已廟奕成兮有寢有堂觚稜翬飛兮丹碧焜煌神之來兮驂四虯旌旗若雲兮風蕭颼黍稷斯馨兮芼藻蘋牲牢肥腯兮酒醴清福我夀我兮俾耆而艾五風十雨兮物無疵癘我民報祀兮彌勤神之澤兮允無垠墓表宋故廸功郎勅授龔州助敎謝公墓表余友謝子温携其五世祖龔州助敎壙誌一通謁余而言曰余祖常遊紫陽朱夫子之門學行醇正為時名儒所著有語錄日錄若干巻藏於家壬辰兵變挈家逃難入山遺文散逸不復得而見矣墓在邑大河之南為盗所發碑文毁裂不復辨所幸壙誌猶存比年海宇寧謐將買石掩諸幽敢干先生一言以賁之則死生受賜多矣余適被召與金華宋先生濓同修元史葢未遑也其從兄子原余壻也亦因事至京師為道其意為請先生為之篆書余既歸而表其墓按公誌公諱璡字公玉曾祖諱叡祖諱諤父諱昇兄弟五人公當其季娶寧國府太平縣李氏子男一人禧年孫三人渭淵源女四長適進武校尉前監戸部贍軍酒庫陳秉哲次適待補太學生胡景參次適待補太學生胡勲次適進士陳禹錫公卒三月塟和光第三甲沈家源出處詳悉鐫墓亭誌余嘗考諸先世遺錄及宋元間邑乗公嘗從朱夫子講性命之㫖葢其學始於格物致知而繼之誠意正心以修其身始於齊家而終於治國平天下始於成已而終至於成物其才識學行足臻逺大而官不配徳使公不得展其所藴同志咸惜之慨自喪亂以來典籍廢壊公之嘉言善行不復備見獨李氏誌乃其手筆嘉㤗初嘗佐邑宰林侯士謙興建廟學碑其畧庠北舊有文公祠以公為配享是其澤之在人葢猶未冺拜瞻遺像尚可想其人焉嗚呼當朱夫子倡道之時海内豪傑之士聞而從之者日衆而祁之人士得及其門者惟公一人而已故自公歿而其傳冺焉然數世之下猶有聞風而興起者未必不自公始也故特表而出之使吾子温刻諸墓上之石墓碣銘元故將仕郎全州路清湘縣主簿陳君墓碣銘君諱龍字義仲新安祁門人世稱竹溪陳氏代有顯者與同邑韓溪汪氏潤田張氏孚溪李氏並為望族事載縣志祖樾宋紹定年間登進士第授將仕郎安慶府司戸叅軍叔祖鼎新繇國學生登第累官知鄂州咸寧縣父仕宏宋歸州學正季父師聖繇國學生登第授迪功郎吉安州敎授母夫人王氏以宋淳祐已酉正月二十有七日生君於雷湖君五嵗讀書頴異秀發及冠舉進士登第授登仕郎南康軍都昌縣主簿至元初江南内附江東宣尉使廉公某蒐賢選士欲官之君固辭不就十八年辛已邑之田阬王萬十王信二謀為亂嘯聚二千餘人無何大軍征討其渠魁潛遁閫帥趙公某諭示轅門督責君等追捕君率里中驍徤獲王萬十王信二於池饒之境事聞省府版授慶元路定海縣海内寨廵檢在官三載民安盗息及代大府喜君廉能檄攝定海縣官界寨巡檢尤稱厥職大徳三年己亥遷饒州路鄱陽縣石門廵檢五年辛丑之官時朝廷調兵數萬人往征八百媳婦君饟饋送之治劇有方秋毫不擾於民且捐已俸剏官署門廡二十餘楹轉池州路貴池縣城山庫上廵檢縣境連嵗大祲餓莩枕藉君廣立防禁推誠綏撫居氓帖然無刼禾攫金者焉陞兩淛都轉運鹽使司長亭塲鹽司管勾先是鹽額恒虧君察知其弊躬厯諸團廣積土鹽增辦如額且補煎前數暨别塲所虧鹽數改撫州路在城税課大使無苛取無巧搜商出於塗賈藏於市各得其驩心除將仕郎全州路清湘縣主簿而君疾不起矣享年七十有四娶方氏宋吏部侍郎袁州太守秋厓先生諱岳之姪建徳府判竹溪先生諱貢孫之女弟也先君二年卒君卒之明年至治癸亥十有二月甲申合塟於里之仙槎源子男四人伯顔伯良君用君濟女適同邑李貴和孫男八人公美公選忽都察都魁孫㤗孫宗立宗獻曾孫男五人文英文理文淵善才天保君自少孝友蚤失所怙奉王夫人承顔養志靡所不至季弟良坤出為宗人後貧無子君取其夫婦同居以篤友于之愛女姪㓜孤鞠育敎誨視猶已出既長厚資裝嫁遣之鄰邑婣家逃竄辟賦役之煩苛者君曰於我乎舘繼粟繼肉不恡也里有争辯君折衷以理人人慚悔得全其家云君博學多聞尤嗜作詩既老自號竹洲逸人歴仕淛左江右登覽名山大川形諸賦詠有古近體詩若干巻曰竹洲集藏於家君之子君用常推擇為吏既而厭簿書之勞怡神完氣逍遙物表一旦惕然永慕懼潛徳之未著也廼具世次行實謁余敘述表諸墓將刻諸貞石貽不朽焉余忝通家之好不敢以蕪陋辭故錄而銘之銘曰陳為著姓代有簮纓承纉綿綿奕葉科名君學夙成家聲善繼惇行孝友吐辭藻麗蒞職匪懈治劇無難拙於媚世飛不盡翰蓄之既深允昌厥後螭碣勒銘聿彰遐乆傳鄭長者傳長者姓鄭名紹卿元之盛徳士也大父諱㤗齡父諱珪咸潛徳弗仕世居歙之雙橋長者生而岐嶷長從鄉先生陳公定宇遊講學知道大原慨然有濟人利物之志先生嘗語人曰紹卿徳性寛厚有容存心愛物他日於人必有所濟其為學也以窮理修徳為先而不事文辭至元間隐居於家人或勸之仕長者曰夫既無知人之智又乏撥亂之才則是不能以有為矣豈不自知以徒取辱乎何如優遊田里孝友於家而終吾身也哉居家孝友婣睦性寛厚温恭犯而不較嘗有怙强罵於道長者聞無所問告者再三乃徐應聲曰已知彼特醉耳顔色自若有田疆畔為人所侵或以告之長者問侵過幾何矣曰適過其畔長者曰吾以為叚之半若畔之半則固以知之矣已而皆知自愧其存心類此家承累世富有之貲又能恭儉不怠制節謹度常計其所入自奉祭祀給家衆外一以周貧睦隣恤婣為事凡鄉之疲瘇㷀獨顛連無告者則分榖粟以賑其饑遺布絮以拯其寒其有死䘮貧窮不能舉事者則遺棺以斂之分地以葬之其他凡可濟人利物之事惟理可為則為之未嘗以人之毁譽為作輟存心公恕人咸服其徳量以故鄉邑有訟理不决者往往求直於長者無不慚服而去居之西有堨曰小母堨者灌田數千畝其源濫觴至堨纔十里每嵗農家待雨霽備草木截流以堰水迨潦退而源已涸矣嘗徒費勞力而未嘗沾其利長者乃謀改圖以石為梁布板為閘以為經久規時徴工於農怨聲四作長者力以為已任捐貲助費不日而成又割田若干畝令收其租以為祈禱修葺之費於是農免堰築之勞嵗沾灌溉之利人人咸歌之因祀以為神論曰熊燔兔炙不加於菽粟之厭飫也狐裘豹袪不加於布帛之温燠也行道顯身不加於樂道而善其身也真若菽粟布帛之可嘉豈以窮居而徳聞加損乎若長者㓜而講學明道常存愛物之心慨然有意於斯世雖其遭時中微不能移其素隐居樂道孝友於家即其平生所行大抵存心以仁處已以忠正已以御物推已以喻人是以居之一家而一家順行之一鄉而一鄉慕不求服人而人自服不求安身而此心悠然超乎物外觀其志其在孔門葢獧者之流而其心則浴沂汶上之心也若夫正已而不求於人無所為而為善則聖賢大學敎人修已治人之方大人正已而物正之道不是過矣程子謂一命之士茍存心於愛物於人必有所濟而吾夫子稱子産為惠人觀其為政於鄭三年而輿人誦之若使吾長者得行其道於當時而攄其素志則其利澤之在人而人之慕化者為何如哉雖不獲試而不得觀其所藴然其徳之在身而不遺於㣲則其徳之及物必能大施而澤被於廣矣特所遇窮達之不同易地則皆然爾夫君子大行不加焉窮居不損焉若吾子者真可謂盛徳之士矣世稱長者不亦宜乎行狀師山先生鄭公行狀先生諱玉字子美世居徽州之歙縣衮繡鄉貞白里十二世祖諱球以貲雄其鄉號雙橋鄭氏曾大父文政大父安至元初聞大兵討李世達將屠城即杖䇿詣軍門言動主帥全活郡民遂授徴事郎歙縣尹沒而民思其徳言於有司請立祠省府嘉歙民之志下其事如請俾列之典祀號鄭令君廟父千齡累官承事郎休寧縣尹以操行著稱學者集士友私謚曰貞白先生有司表所居為貞白里大徳二年戊戌貞白公調官太平縣之弦歌鎮七月一日母夫人汪氏生先生於弦歌火光照室隣里驚駴貞白公心異之嘗指語汪夫人曰吾為吏治獄不任苛刻人蒙吾力脱罪罟者不尠天或報施是兒其大吾門乎先生自髫齓不與凡子伍稍長頴敏不治細務唯嗜讀書禁無以家政闗我才十嵗聞人誦朱子之言則喜其契於吾心也聞人論朱子之道則喜其切於吾身也於是日誦四書玩味朱子之説而紬繹之沉潛反覆久而融㑹貫通得其㫖趣數從鄉先生學意不適輙易師既而載書入黄山祥符寺又遷紫陽南山觀處已以澹薄自持立心以誠敬為本攻苦殖學靡替寒暑嘗因同郡進士王君儀過之欲烹雞供具僮𨽻逐鷄飛鳴蹢躅遂不忍烹王君拊其背曰子美長養此心因是於惻隐之發體認涵養造詣益深矣再應進士舉不利即棄舉子業求聖人之道於六經研精覃思優游涵泳蘄必至古人之域至順初侍貞白公游京師閣老諸公覽其所為古文將交章薦之先生竟奉親南歸不屑也貞白公卒於杭先生扶櫬數百里歸殯於家哀毁踰禮及塟門人士友相執綍者數百人見先生祖載遣奠躃踊袒括一循古典大敬悦之除䘮或勸先生筮仕笑而不荅築室里之師山將著述以見意學者從先生問學紳佩寖盛門人鮑元康等因其地剏師山書院殿堂門廡庖湢咸具講肄有齋登眺有亭先生日與諸生論説春秋而通其大用間被短蓑游釣岑山之陽鄉之人目岑山曰鄭公釣磯元統初有司以先生徳行文學純備才識達於治體滋欲試之以政上薦章於淛省若江南行御史臺先生謝絶不就至正十二年春先生聞蘄黄紅巾兵陷江州郡守李公黼死之西鄉慟哭三月聞饒州繼陷語門人曰主上未有失徳兹不過烏合之衆然承平日久將驕卒惰莫克禦之耳四月蘄兵繇􅄔源破徽城據之先生避地南石耳山五月蘄黄主帥搜求先生先生欲死之門人鮑元康語從子深曰家可再有今先生世不可得深與先生弟璉冐刅入城納賄以免九月大軍克復時州里豪俠多禽脅從者以獻為名爵計先生嘆曰殺人以干祿仁者不為也是冬蘄黄兵再陷郡先生竄靈山山中其徒百計訪先生將至先生所先生亟避之攀磴墮地折臂氣絶復甦明年淛省平章薩木丹巴勒公率大軍來討郡邑悉平平章素知先生名徳欲舉而用之先生以手病辭十四年逺近寧謐門人以師山精舍巋然獨存迎先生講學其中刪定所註春秋或往來岑山手不釋巻六月天子以大臣薦遣使者謝嘉卿齎内府酒帛以翰林侍制奉議大夫召先生於家使者浮海而達九月至郡監郡阿敦哈雅公率僚屬至山中先生卧病不起監郡强起之乃拜受酒帛固辭宣命請以布衣入覲是冬偕使者至淛省而番陽餘孽復陷郡城丞相達實特穆爾公見先生驩甚劇論時事便宜至暮弗倦明日將燕先生先生語丞相曰敝邑為江淛屏翰生民葅醢丞相不亟拯救而寵然燕禮獨何心歟言既泣數行下丞相為之改容即調建徳路元帥劉公某㑹合徽㤗翼官軍征討先生復請給饟饋十六年三月進兵克之輓漕無乏監運􅄔源判官曹子學謂軍士曰此鄭侍制之淚所致也若屬知之否乎四月先生行至海上疾作草謝表授使者而歸六月舟過建徳之淳安邑之梓桐源士族徐氏王氏迎先生登覽河山之勝徐氏將建書堂留先生講道其中是秋門人鮑深自淛來㑹遂與俱歸隐於郡南孤山之麓時淛東元帥巴爾斯布哈公監郡呼都克岱爾公太守鄭公傅翼歙縣尹潘君從善旬朔省起居咨問安民禦㓂方畧孤山之旁富登渡鉅石屹立溪滸先生疇昔釣游其所淮南省平章余公闕大書鄭公釣臺先生自為文記之里人吴虎臣刻諸石十七年還師山纂註周易是時先生竹冠野服一僮抱琴一僮持綸相羊山水間忽憶黄山舊遊偕諸生尋訪故舘浴於丹砂泉磨崖紀嵗月而還秋七月天兵遽至郡城失守先生率昆弟子姪復往梓桐源乃舘徐氏十八年淳安建徳相繼亦破先生間道歸隐休寧山中七月朔旦初度晨起薰沐東向再拜不自勝語弟璉曰夜來達旦不寐何也明日聞郡中大小人言於主帥欲羅致之先生曰吾知死期至矣二雉飛入吾室此其兆也弟璉懼傷先生奮身往主帥拘之不得還令以書招先生亟出先生曰吾荷國厚恩偷生茍容何面目立於天地間耶欲亟死而吏卒猝至急如星火逼廹至郡主帥引見命左右拽之跪拜先生不為禮問爾何不出先生曰昔元朝授以隆賜命之顯秩尚辭不出今何出耶又問爾隐山中曷不為用先生曰我前日不仕今復仕耶抗辭愈厲主帥命左右拽之出覊留郡城先生閉戸髙卧不食七日猶賦詩為文從容若平時手為書喻諸生曰人言食人之食則死其事未食其食奚死然揆之吾心未獲所安先哲論殷三仁胥獲本心士臨事惡可不盡其本心哉吾初欲忼慨殺身以敦風化既不獲遂志今將從容就死以全節義耳復為書戒弟璉屈志以存宗祀戒子逢辰與從子拱辰義居以纉孝友之風夫人聞之使人語之曰君茍死吾其相從地下矣八月一日沐浴更衣北鄉再拜入寓舘自經而死聞者見者賢與不肖咸唶唶嘆息曰男子哉男子哉弟璉奉柩歸殯於家明年已亥十有二月庚午塟休寧縣廟嶺上尊治命也先生娶程氏有賢行克相厥徳子男二人長祖澤蚤卒次逢辰女二人黄庭堅吴宗其婿也惟先生質貌清古襟度坦平卓行特立應機能斷天性孝友自貞白公既歿終身一聞其諱或其遺事輒泣下霑襟每過貞白里門泫然流涕莫能仰視母夫人汪氏病癰若石榴然以歿終身不食榴實弟璉蚤失怙恃先生盡意訓育底於成人從兄國英實祖母洪氏之兄子子也眎如同氣既卒撫其遺孤尤極勤篤每過先塋必下車伏謁自十世祖而下悉立石大書深刻以表其墓復為族譜圖列始祖以下十五世羣從子姪名字刻諸徴事公墓碑之隂敦孝友也為人質直耿介重然諾於人少許可一介不妄取與故逺近學士大夫以孝廉目之每與名公大夫論及為政必以樹綱常厚風俗為急先務其為學大槩本朱子嘗謂學者曰斯道之懿不在言語文字之間而具於性分之内不在髙虚廣逺之際而行乎日用常行之中以此窮理以此淑身以此治民以此覺後庶乎無愧於古之人矣晚年以師道自任誘掖後進無厭怠意門人有過面折之不少貸有善則奬借而汲引之成材者居多其於經則曰易於諸經為首出而獨為完書天地萬物之理古今萬事之變易無不具而吾身心四體出處進退易無不在是故不可一日而不講者於是取文王周公之辭以為經列夫子十翼之辭以為傳其或十翼辭義簡奥則附以註説命曰周易大傳附註既又折衷程朱二夫子之説合為一書命曰程朱易契謂春秋損益四代之制為百王不刋之典所以著聖人之大用體天地之道而無遺具帝王之法而有徴其功足以遏人欲於横流存天理於既滅明之者帝王之治可復有易詩書而無春秋殆皆空言而已惜夫傳之者不知經之大用言異人殊紛如聚訟程傳得經本㫖恨無全書朱子間有論著未及作傳於是稽諸經以證傳之謬因朱子通鑑綱目凡例以經為綱以傳為目凡諸説之合於理者則取之其或經有脱誤無從質證則寧闕之以俟知者命曰春秋闕疑於禮經則屢欲與友人汪某叅互考訂因朱子師友儀禮通解釐析經傳因衛氏集義刪定註説以成一家之言值干戈騷屑而志弗克遂其為文以正大剛直之氣發為雄渾警㧞之辭感慨頓挫簡潔純粹然紀事樸實不為雕鏤鍜錬跌宕怪神之作出入馬遷班固而根之以六經之至理大抵主於明正道扶世敎語子以孝語臣以忠初入京師或傳數篇於奎章閣下侍書學士虞公集授經郎揭公傒斯藝文少監歐陽公𤣥驚以相眎曰是葢工於古文嚴而有法晚與平章余公闕吏部侍郎危公素南臺監察御史程君文最相知而公之文名大振於朝野間矣先生雅好登臨酷嗜山川泉石佳致搜竒選勝極峻窮幽南游淛左右北上燕薊跨齊魯之墟瞻岱宗鳬嶧碣石居庸之秀如石門金華西山南山佳處嘗一再往焉登天目山宿獅子寺盤桓玉立亭上睹雲海之竒觀郡南覆船山邃深險異為吾郡之甲先生甚愛之每夏携書避暑山中門人洪斌為構招隐草堂於眠雲石下嘗偕程君文湖南僉憲鄭君潛前進士胡君南華同游賦詩以詠歌之尤且察山水之情性而默識其理雖未讀郭氏塟書而議論𤣥妙與臨川吴先生所著如合符契嘗喜休寧廟嶺溪山環拱扶輿清淑之氣凝萃於是屬弟璉曰吾歿則塟於是焉因講道師山學者尊之曰師山先生縉紳稱謂率以字行所著詩文若干巻自題曰餘力藁藏於家嘗論先生平生梗槩大抵學有本原而忠義大節處之有素觀其撰漢髙帝索羮論章孝女雙廟碑及獻書乞立故宋文丞相祠以旌節義則先生涵養志趣已皦然於胸中矣故能辭翰林之聘而不受拘囚之辱勁氣耿耿充塞兩間易於困之象曰君子以致命遂志身可危而志不可奪也繄先生之謂矣克寛蚤嵗與先生相知惟深比年往來師山劇談要道不翅異姓兄弟世故搶攘遽成契闊謹以所聞於先生門人弟子者摭其大槩如此庶備朝廷大史氏之採擇云環谷集巻八
